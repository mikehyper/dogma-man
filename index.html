<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>DOGMA MAN</title>
    
    <meta property="og:title" content="DOGMA MAN">
    <meta property="og:description" content="Уничтожай пришельцев!">
    <meta property="og:image" content="img/dogma_prew.png">
    <meta property="og:type" content="website">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="DOGMA MAN">
    <meta name="twitter:description" content="Уничтожай пришельцев!">
    <meta name="twitter:image" content="img/dogma_prew.png">

    <link rel="icon" href="img/favicon.png" type="image/png">
    <style>
        @font-face {
            font-family: 'Pribambas';
            src: local('Pribambas'),
                 url('font/Pribambas-Regular.woff2') format('woff2'),
                 url('font/Pribambas-Regular.woff') format('woff'),
                 url('font/Pribambas-Regular.ttf') format('truetype');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background-color: #ffc240; 
            font-family: 'Pribambas', 'Impact', sans-serif; 
            touch-action: none; 
            color: #000;
        }
        
        canvas { display: block; image-rendering: pixelated; }
        
        /* Сброс синих ссылок и выделений */
        a, button, input, span, div {
            -webkit-tap-highlight-color: transparent;
            color: inherit;
            text-decoration: none;
        }

        #menu-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background-color: #ffc240; z-index: 200; opacity: 1; transition: opacity 0.2s ease-in; 
        }

        .menu-vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; pointer-events: none;
            box-shadow: inset 0 0 110px 30px rgba(250, 174, 51, 0.6);
            background: radial-gradient(circle, transparent 70%, rgba(250, 174, 51, 0.2) 100%);
        }
        
        #stars-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        #rays-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .menu-composition {
            position: relative; width: 800px; height: 800px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; transform-origin: center center;
        }

        /* --- AUTH STYLES --- */
        #auth-top-layer {
            position: absolute; top: 20px; left: 0; width: 100%;
            padding: 0 15px;
            display: flex; justify-content: space-between; align-items: flex-start;
            z-index: 300; pointer-events: auto;
            box-sizing: border-box;
            transform-origin: top left;
        }

        .auth-btn-group { display: flex; gap: 10px; flex-wrap: nowrap; justify-content: flex-start; }

        .dogma-btn {
            background: #ffc240;
            border: 4px solid #000;
            box-shadow: 4px 4px 0 #000;
            padding: 0 20px;
            height: 54px;
            font-family: 'Pribambas', sans-serif;
            font-size: 24px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            line-height: 1;
            transition: transform 0.1s, background 0.2s;
            transform: scale(0);
            animation: popInCenter 0.5s 0.2s cubic-bezier(0.17, 0.67, 0.83, 1) forwards;
            color: #000 !important; /* Принудительно черный */
        }
        .dogma-btn:hover { background: #ffe09d; }
        .dogma-btn:active { transform: translate(2px, 2px) scale(1); box-shadow: 2px 2px 0 #000; }

        .modal-box .dogma-btn {
            background: #000;
            color: #fff !important;
            border-color: #000;
            box-shadow: 4px 4px 0 #ffc240;
            transform: scale(1);
            animation: none;
            width: 100%;
        }
        .modal-box .dogma-btn:hover { background: #333; }

        .icon-btn { padding: 0; width: 54px; height: 54px; flex-shrink: 0; animation-delay: 0.1s; }
        .icon-btn img { width: 28px; height: auto; display: block; }
        
        .user-nick-btn { 
            gap: 8px; font-size: 28px; height: 54px; 
            box-sizing: border-box; animation-delay: 0.15s; 
            max-width: 330px; overflow: hidden; justify-content: flex-start;
            padding-left: 12px;
        }
        .user-nick-btn span {
            display: block;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            mask-image: linear-gradient(to right, black 84%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 84%, transparent 100%);
            transform: translateY(-3px);
        }
        .user-nick-btn img { height: 24px; width: auto; flex-shrink: 0; margin-left: -4px; }

        /* WINNER ICON STYLES */
        #global-leaderboard-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 80px;
            height: 80px;
            cursor: pointer;
            z-index: 400;
            background: none;
            border: none;
            padding: 0;
            animation: winnerPulse 2s infinite ease-in-out;
            transition: opacity 0.3s ease;
        }
        #global-leaderboard-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        @keyframes winnerPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(0,0,0,0.2)); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 15px rgba(255,255,255,0.5)); }
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .mobile-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffc240;
            display: none;
            z-index: 1300;
            box-sizing: border-box;
            padding: 16px;
            overflow: auto;
            align-items: center;
            justify-content: center;
        }
        .mobile-screen .modal-box {
            width: min(92vw, 520px);
            max-width: 520px;
            margin: 0;
            transform: none !important;
            box-shadow: 6px 6px 0 #000;
            padding: 18px;
            box-sizing: border-box;
        }
        .mobile-screen .modal-close {
            position: static;
            align-self: flex-end;
            margin: -8px -4px -4px 0;
        }
        .mobile-screen .score-header-row {
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }
        .mobile-screen .search-container {
            width: 100%;
            max-width: none;
        }
        #mobile-score-screen .modal-box {
            max-height: 88vh;
            overflow: auto;
        }
        #mobile-score-screen .score-table {
            font-size: 18px;
        }
        .modal-box {
            background: #ffc240;
            border: 6px solid #000;
            padding: 40px;
            position: relative;
            width: 90%; max-width: 400px;
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: 10px 10px 0 #000;
            transform-origin: center center;
            color: #000;
        }

        /* CUSTOM SCROLLBAR */
        #scoreboard-box::-webkit-scrollbar { width: 12px; }
        #scoreboard-box::-webkit-scrollbar-track { background: #E0A11D; border-left: 4px solid #000; }
        #scoreboard-box::-webkit-scrollbar-thumb { background: #000; border: 2px solid #ffc240; }

        .modal-box h2 { margin: 0 0 10px 0; font-size: 42px; text-align: center; line-height: 1; color: #000; }
        .modal-box input {
            padding: 12px; font-family: 'Pribambas'; font-size: 22px;
            border: 4px solid #000; background: #fff; outline: none;
            box-sizing: border-box; color: #000;
        }
        .modal-close {
            position: absolute; top: 10px; right: 10px;
            width: 35px; height: 35px; background: none;
            border: none; font-size: 40px; font-family: 'Arial', sans-serif;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            z-index: 10; line-height: 1; color: #000 !important;
        }

        .score-header-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; gap: 20px;
        }
        .score-header-row h2 { margin: 0; text-align: left; }
        .search-container {
            position: relative; flex-grow: 1; max-width: 200px;
        }
        .search-container input {
            width: 100%; padding: 8px 35px 8px 10px; font-size: 20px; height: 40px;
        }
        .search-container img {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 20px; pointer-events: none;
        }

        #scoreboard-box { max-width: 600px; width: 95%; max-height: 80vh; overflow-y: auto; padding-top: 40px; }
        .score-table { width: 100%; border-collapse: collapse; font-size: 22px; color: #000; }
        .score-table thead { background: #000; color: #fff; }
        .score-table th { text-align: left; padding: 12px; border: 2px solid #000; line-height: 1; }
        .score-table td { padding: 12px; border: 2px solid #000; line-height: 1; vertical-align: middle; }
        .current-user-row { background: rgba(255,255,255,0.4); font-weight: bold; }

        @keyframes popInCenter { 0% { transform: scale(0); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes popInCig { 0% { transform: translate(97px, -173px) scale(0); } 70% { transform: translate(97px, -173px) scale(1.1); } 100% { transform: translate(97px, -173px) scale(1); } }
        @keyframes popInLeaf { 0% { transform: translate(114px, 115px) scale(0); } 70% { transform: translate(114px, 115px) scale(1.1); } 100% { transform: translate(114px, 115px) scale(1); } }
        @keyframes popInStar { 0% { transform: translate(-283px, 51px) scale(0); } 70% { transform: translate(-283px, 51px) scale(1.1); } 100% { transform: translate(-283px, 51px) scale(1); } }
        @keyframes popInDgm { 0% { transform: translate(-305px, -184px) scale(0); } 70% { transform: translate(-305px, -184px) scale(1.1); } 100% { transform: translate(-305px, -184px) scale(1); } }
        @keyframes popInGlow { 0% { transform: translate(calc(-50% - 6px), calc(-50% + 18px)) scale(0); } 70% { transform: translate(calc(-50% - 6px), calc(-50% + 18px)) scale(1.1); } 100% { transform: translate(calc(-50% - 6px), calc(-50% + 18px)) scale(1); } }

        #menu-logo { width: 700px; height: auto; z-index: 12; margin-bottom: -90px; margin-left: 50px; position: relative; transform: scale(0); animation: popInCenter 0.5s 0.1s cubic-bezier(0.17, 0.67, 0.83, 1) forwards; }
        #menu-hero { width: 450px; height: auto; z-index: 15; position: relative; margin-top: 20px; margin-left: -50px; transform: scale(0); animation: popInCenter 0.5s 0.3s cubic-bezier(0.17, 0.67, 0.83, 1) forwards; }
        
        #menu-glow { 
            position: absolute; 
            width: 510px; 
            height: auto; z-index: 11; 
            top: 50%; 
            left: calc(58% + 10px); 
            transform: translate(calc(-50% - 6px), calc(-50% + 18px)) scale(0); 
            pointer-events: none; 
            opacity: 0.78; 
            animation: popInGlow 0.6s 0.2s forwards, pulseGlow 2s 0.8s infinite ease-in-out; 
        }

        .decor-obj { position: absolute; z-index: 100; pointer-events: none; height: auto; }
        #obj-cig { width: 162px; top: 50%; left: 58%; transform: translate(97px, -173px) scale(0); animation: popInCig 0.5s 0.5s forwards; }
        #obj-leaf { width: 125px; top: 50%; left: 58%; transform: translate(114px, 115px) scale(0); animation: popInLeaf 0.5s 0.7s forwards; }
        #obj-star { width: 79px; top: 60%; left: 45%; transform: translate(-283px, 51px) scale(0); animation: popInStar 0.5s 0.8s forwards; }
        #obj-dgm { width: 130px; top: 60%; left: 45%; transform: translate(-305px, -184px) scale(0); animation: popInDgm 0.5s 0.6s forwards; }

        #top-info-text { transform: scale(0); animation: popInCenter 0.5s 0.9s forwards; color: #000; font-size: 24px; margin-bottom: 5px; z-index: 20; text-align: center; }
        #final-score-display { transform: scale(0); animation: popInCenter 0.5s 1.0s forwards; }

        @keyframes pulseGlow { 
            0%, 100% { transform: translate(calc(-50% - 6px), calc(-50% + 18px)) scale(1); opacity: 0.58; } 
            50% { transform: translate(calc(-50% - 6px), calc(-50% + 18px)) scale(1.1); opacity: 0.87; } 
        }
        
        .menu-score-text { 
            z-index: 20; height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; position: relative; color: #000; line-height: 1; white-space: nowrap; 
        }
        
        #menu-status-wrapper { font-size: 60px; margin-top: -7px; display: flex; align-items: center; gap: 15px; color: #000; }
        .menu-controls-text { position: absolute; top: 75px; color: #c28b1a; font-size: 22px; opacity: 0; transition: opacity 0.2s ease; z-index: 20; text-align: center; margin: 0; }
        .show-text { opacity: 0.9; }

        .ui-panel { position: absolute; top: 50px; width: 100%; display: grid; grid-template-columns: 1fr 1fr 1fr; color: #000; pointer-events: none; z-index: 100; }
        .ui-section { display: flex; flex-direction: column; align-items: center; }
        .stat-label { font-size: 20px; margin-bottom: -5px; }
        .stat-value { font-size: 44px; display: inline-block; transition: transform 0.2s ease; line-height: 1; }
        
        .killed-container { 
            display: flex; align-items: center; font-size: 52px; line-height: 1; margin-top: 9px; white-space: nowrap; transition: color 0.2s ease, transform 0.2s ease; 
        }
        @keyframes killedPulse {
            0% { transform: scale(1); color: #000; }
            50% { transform: scale(1.25); color: #fff; text-shadow: 0 0 15px rgba(255,255,255,1); }
            100% { transform: scale(1); color: #000; }
        }
        .pulse-bonus { animation: killedPulse 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #enemies { margin-left: 15px; display: inline-block; }
        #hp-container { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); width: 280px; height: 12px; border: 2px solid #000; z-index: 110; overflow: hidden; }
        #hp-bar { width: 100%; height: 100%; background: #fff; transition: width 0.2s ease; }
        .km-unit { font-size: 24px; margin-left: 3px; }

        @media (max-width: 768px) { 
            .ui-panel {
                top: 42px;
                left: 0;
                width: 100%;
                box-sizing: border-box;
                padding: 0 8px;
                grid-template-columns: 1fr auto 1fr;
                transform: none;
            }
            .ui-panel .stat-label { font-size: 16px; }
            .ui-panel .ui-section:first-child .stat-value,
            .ui-panel .ui-section:last-child .stat-value { font-size: 28px; }
            .stat-value { font-size: 32px; } 
            .killed-container { font-size: 32px; }
            .ui-panel .ui-section:first-child { 
                align-items: flex-start;
                padding-left: 0 !important;
            }
            .ui-panel .ui-section:last-child { 
                align-items: flex-end;
                padding-right: 0 !important;
            }
            #hp-container { 
                top: 14px;
                width: 170px;
                height: 9px;
                border-width: 2px;
            }
            .auth-btn-group .dogma-btn { font-size: 22px; padding: 0 16px; height: 54px; border-width: 3px; }
            .user-nick-btn { font-size: 22px; height: 54px; max-width: 250px; gap: 4px; padding: 0 10px 0 4px; }
            .user-nick-btn span { transform: translateY(3px); }
            .user-nick-btn img { height: 21px; margin-right: -1px; margin-left: -6px; }
            .icon-btn { width: 54px; height: 54px; }
            #global-leaderboard-btn { width: 70px; height: 70px; bottom: 20px; right: 20px; }
            .modal-close { top: 5px; right: 5px; }
            .score-header-row { flex-direction: column; align-items: flex-start; gap: 10px; }
            #auth-top-layer { top: 10px; padding: 0 10px; }
            .mobile-screen { padding: 12px; }
            .mobile-screen .modal-box {
                width: min(94vw, 460px);
                padding: 14px;
                border-width: 5px;
                box-shadow: 5px 5px 0 #000;
            }
            .mobile-screen .modal-box h2 { font-size: 32px; }
            #mobile-score-screen .score-table { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div id="hp-container"><div id="hp-bar"></div></div>
    
    <div id="menu-overlay">
        <div id="auth-top-layer">
            <div id="guest-group" class="auth-btn-group">
                <button class="dogma-btn" onclick="openModal('reg-modal')">РЕГИСТРАЦИЯ</button>
                <button class="dogma-btn" onclick="openModal('login-modal')">ВХОД</button>
            </div>
            <div id="user-group" class="auth-btn-group" style="display: none;">
                <button class="dogma-btn icon-btn" onclick="logout()">
                    <img src="img/logout.png" alt="Logout">
                </button>
                <button class="dogma-btn user-nick-btn" onclick="openScoreboard(true)">
                    <img src="img/win.png" alt="Win">
                    <span id="display-nickname">ГОСТЬ</span>
                </button>
            </div>
        </div>

        <button id="global-leaderboard-btn" onclick="openScoreboard(false)">
            <img src="img/winner.png" alt="Leaderboard">
        </button>

        <canvas id="stars-canvas"></canvas>
        <svg id="rays-container" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice"><g id="rays-group" transform="translate(500, 500)"></g></svg>
        <div class="menu-vignette"></div>
        <div class="menu-composition" id="menu-comp">
            <img id="menu-glow" src="img/glow.png">
            <img id="menu-logo" src="img/logo.png">
            <img id="menu-hero" src="img/hero_menu.png">
            <img id="obj-cig" class="decor-obj" src="img/cig_main.png">
            <img id="obj-leaf" class="decor-obj" src="img/leaf_main.png">
            <img id="obj-star" class="decor-obj" src="img/star_main.png">
            <img id="obj-dgm" class="decor-obj" src="img/dgm_main.png">
            <div id="top-info-text">НА ПЛАНЕТУ НАПАЛИ ИНОПЛАНЕТНЫЕ МОНСТРЫ</div>
            <div id="final-score-display" class="menu-score-text">
                <div id="menu-status-wrapper">УНИЧТОЖАЙ ПРИШЕЛЬЦЕВ!</div>
                <p id="controls-text" class="menu-controls-text show-text">ПРОБЕЛ: ПРЫГАЙ | КОНТРЛ: СТРЕЛЯЙ</p>
            </div>
        </div>
    </div>

    <div id="reg-modal" class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('reg-modal')">×</button>
            <h2>РЕГИСТРАЦИЯ</h2>
            <input type="text" id="reg-name" placeholder="ВВЕДИТЕ ИМЯ">
            <input type="password" id="reg-pass" placeholder="ПРИДУМАЙТЕ ПАРОЛЬ">
            <button class="dogma-btn" onclick="handleAuth('reg')">ОКЕЙ</button>
        </div>
    </div>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('login-modal')">×</button>
            <h2>ВХОД</h2>
            <input type="text" id="login-name" placeholder="НИКНЕЙМ">
            <input type="password" id="login-pass" placeholder="ВАШ ПАРОЛЬ">
            <button class="dogma-btn" onclick="handleAuth('login')">ОКЕЙ</button>
        </div>
    </div>

    <div id="score-modal" class="modal-overlay">
        <div class="modal-box" id="scoreboard-box">
            <button class="modal-close" onclick="closeModal('score-modal')">×</button>
            <div class="score-header-row">
                <h2>ТОП БОЙЦОВ</h2>
                <div class="search-container">
                    <input type="text" id="score-search" placeholder="ПОИСК..." oninput="filterScoreboard()">
                    <img src="img/search.png" alt="Search">
                </div>
            </div>
            <table class="score-table">
                <thead>
                    <tr><th>№</th><th>ИМЯ</th><th>УБИТО</th><th>КМ</th></tr>
                </thead>
                <tbody id="score-body"></tbody>
            </table>
        </div>
    </div>

    <div id="mobile-auth-screen" class="mobile-screen">
        <div class="modal-box">
            <button class="modal-close" onclick="closeMobileScreen('mobile-auth-screen')">×</button>
            <h2 id="mobile-auth-title">РЕГИСТРАЦИЯ</h2>
            <input type="text" id="mobile-auth-name" placeholder="НИКНЕЙМ">
            <input type="password" id="mobile-auth-pass" placeholder="ПАРОЛЬ">
            <button class="dogma-btn" onclick="submitMobileAuth()">ОКЕЙ</button>
        </div>
    </div>

    <div id="mobile-score-screen" class="mobile-screen">
        <div class="modal-box">
            <button class="modal-close" onclick="closeMobileScreen('mobile-score-screen')">×</button>
            <div class="score-header-row">
                <h2>ТОП БОЙЦОВ</h2>
                <div class="search-container">
                    <input type="text" id="mobile-score-search" placeholder="ПОИСК..." oninput="filterScoreboard()">
                    <img src="img/search.png" alt="Search">
                </div>
            </div>
            <table class="score-table">
                <thead>
                    <tr><th>№</th><th>ИМЯ</th><th>УБИТО</th><th>КМ</th></tr>
                </thead>
                <tbody id="mobile-score-body"></tbody>
            </table>
        </div>
    </div>

    <div class="ui-panel">
        <div class="ui-section" style="align-items: flex-start; padding-left: 40px;">
            <div class="stat-label">ДИСТАНЦИЯ</div>
            <div id="distVal" class="stat-value">0м</div>
        </div>
        <div class="ui-section">
            <div class="killed-container" id="killed-wrapper">
                <span>УНИЧТОЖЕНО:</span><span id="enemies">0</span>
            </div>
        </div>
        <div class="ui-section" style="align-items: flex-end; padding-right: 40px;">
            <div class="stat-label">БОЕПРИПАСЫ</div>
            <div id="ammo-count" class="stat-value">20</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script>
// --- AUTH LOGIC ---
let currentUser = null;
let currentUserUid = null;
let isModalOpen = false;
let globalScores = [];

let firebaseEnabled = false;

function isFirebaseConfigured() {
    return Object.values(firebaseConfig).every((v) => typeof v === 'string' && !v.includes('YOUR_'));
}

function nicknameToEmail(name) {
    const normalized = name.trim().toLowerCase();
    // encodeURIComponent стабильно кодирует кириллицу и спецсимволы в hex-последовательность.
    // Удаляем '%' и используем как безопасную уникальную часть email.
    const encoded = encodeURIComponent(normalized).replace(/%/g, '').slice(0, 60);
    return `u${encoded || 'player'}@dogma.local`;
}

function legacyNicknameToEmail(name) {
    const normalized = name.trim().toLowerCase().replace(/[^a-z0-9._-]/g, '');
    return `${normalized || 'player'}@dogma.local`;
}

function nicknameEmailCandidates(name) {
    const primary = nicknameToEmail(name);
    const legacy = legacyNicknameToEmail(name);
    return primary === legacy ? [primary] : [primary, legacy];
}

function initFirebase() {
    if (typeof firebase === 'undefined') return;
    if (!isFirebaseConfigured()) return;
    try {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        fbAuth = firebase.auth();
        fbDb = firebase.firestore();
        firebaseEnabled = true;
    } catch (err) {
        firebaseEnabled = false;
    }
}

function applyAuthState(name, uid = null) {
    currentUser = name || null;
    currentUserUid = uid || null;
    const guestGroup = document.getElementById('guest-group');
    const userGroup = document.getElementById('user-group');
    const nicknameEl = document.getElementById('display-nickname');

    if (currentUser) {
        nicknameEl.innerText = currentUser.toUpperCase();
        guestGroup.style.display = 'none';
        userGroup.style.display = 'flex';
    } else {
        nicknameEl.innerText = "ГОСТЬ";
        guestGroup.style.display = 'flex';
        userGroup.style.display = 'none';
    }
}

function persistCurrentUser() {
    try {
        if (currentUser) localStorage.setItem('dogma_current_user', currentUser);
        else localStorage.removeItem('dogma_current_user');
    } catch (err) {}
}

async function performAuth(type, name, pass) {
    if (!name || !pass) return false;

    if (!firebaseEnabled) {
        applyAuthState(name, null);
        persistCurrentUser();
        return true;
    }

    const emails = nicknameEmailCandidates(name);
    const email = emails[0];
    try {
        let cred;
        if (type === 'reg') {
            cred = await fbAuth.createUserWithEmailAndPassword(email, pass);
            await fbDb.collection('players').doc(cred.user.uid).set({
                nickname: name,
                nicknameUpper: name.toUpperCase(),
                nicknameLower: name.toLowerCase(),
                kills: 0,
                distKm: 0,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            applyAuthState(name, cred.user.uid);
        } else {
            let lastErr = null;
            for (const candidate of emails) {
                try {
                    cred = await fbAuth.signInWithEmailAndPassword(candidate, pass);
                    break;
                } catch (signInErr) {
                    lastErr = signInErr;
                }
            }
            if (!cred) throw lastErr;
            const snap = await fbDb.collection('players').doc(cred.user.uid).get();
            const profileName = snap.exists && snap.data().nickname ? snap.data().nickname : name;
            applyAuthState(profileName, cred.user.uid);
        }
        persistCurrentUser();
        return true;
    } catch (err) {
        const code = err && err.code ? err.code : '';

        if (type === 'reg' && code === 'auth/email-already-in-use') {
            try {
                // Если ник уже существует, пытаемся войти с указанным паролем.
                const cred = await fbAuth.signInWithEmailAndPassword(email, pass);
                const snap = await fbDb.collection('players').doc(cred.user.uid).get();
                const profileName = snap.exists && snap.data().nickname ? snap.data().nickname : name;
                applyAuthState(profileName, cred.user.uid);
                persistCurrentUser();
                alert('Этот ник уже зарегистрирован. Выполнен вход.');
                return true;
            } catch (loginErr) {
                alert('Этот ник уже зарегистрирован. Нажмите "ВХОД" и введите верный пароль.');
                return false;
            }
        }

        if (code === 'auth/invalid-credential' || code === 'auth/wrong-password') {
            alert('Неверный пароль или никнейм.');
            return false;
        }

        if (code === 'auth/too-many-requests') {
            alert('Слишком много попыток. Попробуйте чуть позже.');
            return false;
        }

        alert('Ошибка авторизации: ' + (err.message || 'проверьте данные'));
        return false;
    }
}

async function saveCurrentUserStats() {
    if (!firebaseEnabled || !currentUserUid) return;
    try {
        const docRef = fbDb.collection('players').doc(currentUserUid);
        const snap = await docRef.get();
        const prev = snap.exists ? snap.data() : {};
        const nextKills = Math.max(prev.kills || 0, enemiesDefeated || 0);
        const nextDist = Math.max(prev.distKm || 0, Number((distance / 1000).toFixed(1)));
        await docRef.set({
            nickname: currentUser,
            nicknameUpper: (currentUser || 'ГОСТЬ').toUpperCase(),
            nicknameLower: (currentUser || 'ГОСТЬ').toLowerCase(),
            kills: nextKills,
            distKm: nextDist,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
    } catch (err) {}
}

async function loadCloudScores() {
    if (!firebaseEnabled || !fbDb) return null;
    try {
        const snap = await fbDb.collection('players').orderBy('kills', 'desc').limit(500).get();
        const items = [];
        snap.forEach((doc) => {
            const d = doc.data();
            items.push({
                name: (d.nickname || 'ИГРОК').toUpperCase(),
                kills: Number(d.kills || 0),
                dist: Number(d.distKm || 0).toFixed(1),
                current: doc.id === currentUserUid
            });
        });
        return items;
    } catch (err) {
        return null;
    }
}

function renderScoreTable(data) {
    const body = document.getElementById('score-body');
    const mobileBody = document.getElementById('mobile-score-body');
    if (body) body.innerHTML = '';
    if (mobileBody) mobileBody.innerHTML = '';

    data.forEach((d) => {
        const originalIndex = globalScores.findIndex(item => item.name === d.name && item.kills === d.kills) + 1;
        const rowHtml = `<td>${originalIndex}</td><td>${d.name}</td><td>${d.kills}</td><td>${d.dist}</td>`;

        if (body) {
            const row = document.createElement('tr');
            if (d.current) row.className = 'current-user-row';
            row.innerHTML = rowHtml;
            body.appendChild(row);
        }
        if (mobileBody) {
            const mobileRow = document.createElement('tr');
            if (d.current) mobileRow.className = 'current-user-row';
            mobileRow.innerHTML = rowHtml;
            mobileBody.appendChild(mobileRow);
        }
    });
}

function adjustMenuScale() {
    const comp = document.getElementById('menu-comp');
    if(!comp) return;
    const baseW = 800; const baseH = 800;
    const screenW = window.innerWidth * 0.95; const screenH = window.innerHeight * 0.95;
    const scale = Math.min(screenW / baseW, screenH / baseH);
    comp.style.transform = `scale(${scale})`;

    const modals = document.querySelectorAll('.modal-box');
    modals.forEach(m => {
        const modalScale = isMobileDevice ? 1 : scale;
        m.style.transform = `scale(${modalScale})`;
    });

    const topAuth = document.getElementById('auth-top-layer');
    if(topAuth) {
        // Уменьшаем масштаб на мобилках чуть сильнее, чтобы не вылезало
        const authScale = window.innerWidth < 600 ? Math.min(scale * 0.9, 0.8) : Math.max(scale, 0.7);
        topAuth.style.transform = `scale(${authScale})`;
    }
}

    animationId = requestAnimationFrame(render);
}

function drawCitylineLayer(cityData, camX, camY, panelColor) { const gy = getGroundY(), tw = cityData.totalWidth; ctx.fillStyle = panelColor; ctx.fillRect(0, gy + camY + 8, canvas.width, 3500); cityData.objects.forEach(obj => { let dx = (obj.x - camX) % tw; if (dx < -1500) dx += tw; if (dx > canvas.width + 1500) dx -= tw; ctx.drawImage(obj.img, dx, gy - (obj.img.height * obj.scale) + camY + 12, obj.img.width * obj.scale, obj.img.height * obj.scale); }); }
function drawCloudsLayer(data, camX, camY) { const tw = data.totalWidth, gy = getGroundY(); data.objects.forEach(obj => { let dx = (obj.x - camX) % tw; if (dx < -1500) dx += tw; if (dx > canvas.width + 1500) dx -= tw; ctx.save(); ctx.globalAlpha = obj.opacity; ctx.drawImage(obj.img, dx, gy + obj.offY + camY, obj.img.width * obj.scale, obj.img.height * obj.scale); ctx.restore(); }); }
function drawMountainsLayer(mountainsArray, camX, camY) { const gy = getGroundY(), tw = mountainsArray.length * canvas.width; mountainsArray.forEach(mt => { let dx = (mt.xOffset - camX) % tw; if (dx < -canvas.width) dx += tw; if (dx > canvas.width) dx -= tw; ctx.fillStyle = mt.color; ctx.beginPath(); ctx.moveTo(dx, canvas.height + 2500); ctx.lineTo(dx + mt.points[0].x, gy + mt.points[0].y + camY); for (let j = 1; j < mt.points.length; j++) ctx.lineTo(dx + mt.points[j].x, gy + mt.points[j].y + camY); ctx.lineTo(dx + canvas.width, canvas.height + 2500); ctx.closePath(); ctx.fill(); }); }
function drawStaticObjectsLayer(data, camX, camY) { const gy = getGroundY(), tw = data.totalWidth; data.objects.forEach(obj => { let dx = (obj.x - camX) % tw; if (dx < -2500) dx += tw; if (dx > canvas.width + 2500) dx -= tw; if (obj.img.complete) ctx.drawImage(obj.img, dx, gy - obj.img.height + camY + 20); }); }

function triggerGameOver() { 
    if (isGameOver) return; isGameOver = true; isFiring = false; 
    let fadeOut = setInterval(() => { if (currentTrack.volume > 0.01) { currentTrack.volume -= 0.01; } else { currentTrack.volume = 0; currentTrack.pause(); clearInterval(fadeOut); } }, 20); 
    sounds.woosh.pause(); sounds.power.pause(); sounds.death.play(); sounds.bg.currentTime = 0; sounds.bg.play(); 
    gameOverTimer = 150; shakeTime = 40; canRestart = false; controlsText.classList.remove('show-text'); 
    const dText = distance < 1000 ? Math.floor(distance) + "м" : (distance/1000).toFixed(1) + "км"; 
    topInfoText.innerText = "ДИСТАНЦИЯ: " + dText; 
    menuStatusWrapper.style.fontSize = isMobileDevice ? "45px" : "75px"; 
    menuStatusWrapper.innerText = "УНИЧТОЖЕНО: " + enemiesDefeated; 
    adjustMenuScale();
    restartLeaderboardPulse();
    saveCurrentUserStats();
}

function start() { 
    if (isModalOpen) return;
    isLeaderboardPulseSynced = false;
    sounds.bg.pause(); if (!isMobileDevice) currentTrack.volume = 0.3; currentTrack.currentTime = 0; currentTrack.play(); 
    menuOverlay.style.opacity = 0; setTimeout(() => { if (!isGameOver) menuOverlay.style.display = 'none'; }, 200); 
    isGameOver = false; isFirstRun = false; enemiesDefeated = 0; ammo = 20; distance = 0; lastSpawnDist = 0; updateAmmo(20); enemiesEl.innerText = enemiesDefeated; hp = 100; updateHPBar(); invulFrames = 0; boostTimer = 0; superShotTimer = 0; shieldTimer = 0; boostExitSafety = 0; baseSpeed = 9; gameSpeed = 9; isBraking = false; frame = 0; obstacles = []; bullets = []; particles = []; canRestart = false; cameraScrollY = 0;
    hero.init(); cancelAnimationFrame(animationId); requestAnimationFrame(render); 
}

window.addEventListener('keydown', (e) => { 
    if (isModalOpen) return;
    if (e.code === 'Space') { e.preventDefault(); if (isFirstRun || (isGameOver && canRestart)) start(); else hero.jump(); } 
    if (e.key === 'Control' && !isGameOver && !isFirstRun) { isFiring = true; if ((ammo > 0) && superShotTimer <= 0 && Date.now()-lastShotTime > 110) { fireBullet(); lastShotTime = Date.now(); } } 
});
window.addEventListener('keyup', (e) => { if (e.key === 'Control') isFiring = false; });
window.addEventListener('touchstart', (e) => {
    if (isModalOpen) return;
    const target = e.target;
    if (target.tagName === 'BUTTON' || target.closest('button') || target.closest('#global-leaderboard-btn')) return;
    e.preventDefault(); const touchX = e.touches[0].clientX, mid = window.innerWidth / 2;
    if (isFirstRun || (isGameOver && canRestart)) { start(); return; }
    if (touchX < mid) hero.jump(); else { isFiring = true; if ((ammo > 0) && superShotTimer <= 0 && Date.now() - lastShotTime > 110) { fireBullet(); lastShotTime = Date.now(); } }
}, { passive: false });
window.addEventListener('touchend', (e) => { let stillFiring = false; for (let i = 0; i < e.touches.length; i++) { if (e.touches[i].clientX >= window.innerWidth / 2) stillFiring = true; } if (!stillFiring) isFiring = false; });
</script>
</body>
