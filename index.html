<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>DOGMA MAN</title>
    
    <meta property="og:title" content="DOGMA MAN">
    <meta property="og:description" content="Уничтожай пришельцев!">
    <meta property="og:image" content="img/dogma_prew.png">
    <meta property="og:type" content="website">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="DOGMA MAN">
    <meta name="twitter:description" content="Уничтожай пришельцев!">
    <meta name="twitter:image" content="img/dogma_prew.png">

    <link rel="icon" href="img/favicon.png" type="image/png">
    <style>
        @font-face {
            font-family: 'Pribambas';
            src: local('Pribambas'),
                 url('font/Pribambas-Regular.woff2') format('woff2'),
                 url('font/Pribambas-Regular.woff') format('woff'),
                 url('font/Pribambas-Regular.ttf') format('truetype');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background-color: #ffc240; 
            font-family: 'Pribambas', 'Impact', sans-serif; 
            touch-action: none; 
            color: #000;
        }
        
        canvas { display: block; }
        #stars-canvas { image-rendering: pixelated; }
        #gameCanvas { image-rendering: auto; }
        
        /* Сброс синих ссылок и выделений */
        a, button, input, span, div {
            -webkit-tap-highlight-color: transparent;
            color: inherit;
            text-decoration: none;
        }

        #menu-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background-color: #ffc240; z-index: 200; opacity: 1; transition: opacity 0.2s ease-in; 
        }

        .menu-vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; pointer-events: none;
            box-shadow: none;
            background: none;
        }
        
        #stars-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        #rays-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .menu-composition {
            position: relative; width: 800px; height: 800px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; transform-origin: center center;
        }

        /* --- AUTH STYLES --- */
        #auth-top-layer {
            position: absolute;
            top: 20px;
            right: 20px;
            width: auto;
            padding: 0;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            z-index: 300; pointer-events: auto;
            box-sizing: border-box;
            transform-origin: top right;
        }

        .auth-btn-group { display: flex; gap: 10px; flex-wrap: nowrap; justify-content: flex-start; }
        #user-group {
            flex-direction: row;
            align-items: flex-start;
            gap: 10px;
        }
        #user-group .icon-btn {
            align-self: flex-end;
        }

        #dgm-top-logo-link {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 110px;
            height: 110px;
            z-index: 410;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transform: scale(1);
            transition: transform 0.22s ease, filter 0.22s ease;
            filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0));
            pointer-events: auto;
            animation: winnerPulse 2s infinite ease-in-out;
        }
        #dgm-top-logo-link img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        #dgm-top-logo-link:hover {
            transform: scale(1.12);
            filter: drop-shadow(0 0 14px rgba(255, 255, 255, 0.7));
        }

        .dogma-btn {
            background: #ffc240;
            border: 4px solid #000;
            box-shadow: 4px 4px 0 #000;
            padding: 0 20px;
            height: 54px;
            font-family: 'Pribambas', sans-serif;
            font-size: 24px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            line-height: 1;
            transition: transform 0.1s, background 0.2s;
            transform: scale(0);
            animation: popInCenter 0.5s 0.2s cubic-bezier(0.17, 0.67, 0.83, 1) forwards;
            color: #000 !important; /* Принудительно черный */
        }
        .dogma-btn:hover { background: #ffe09d; }
        .dogma-btn:active { transform: translate(2px, 2px) scale(1); box-shadow: 2px 2px 0 #000; }

        .modal-box .dogma-btn {
            background: #000;
            color: #fff !important;
            border-color: #000;
            box-shadow: 4px 4px 0 #ffc240;
            transform: scale(1);
            animation: none;
            width: 100%;
        }
        .modal-box .dogma-btn:hover { background: #333; }

        .icon-btn { padding: 0; width: 54px; height: 54px; flex-shrink: 0; animation-delay: 0.1s; }
        .icon-btn img { width: 28px; height: auto; display: block; }
        
        .user-nick-btn { 
            gap: 4px; font-size: 28px; height: 54px; 
            box-sizing: border-box; animation-delay: 0.15s; 
            width: auto; max-width: 246px; overflow: hidden; justify-content: flex-start;
            padding: 0 10px 0 8px;
        }
        .user-nick-text-clip {
            flex: 0 1 auto;
            overflow: hidden;
            max-width: 176px;
            mask-image: linear-gradient(to right, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%);
            transform: translateY(-3px);
        }
        .user-nick-btn span {
            display: inline-block;
            line-height: 1;
            white-space: nowrap;
            transform: translateX(0px);
            transition: transform 0.9s ease;
        }
        .user-nick-btn img { height: 24px; width: auto; flex-shrink: 0; margin-left: 0; }

        /* WINNER ICON STYLES */
        #global-leaderboard-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 80px;
            height: 80px;
            cursor: pointer;
            z-index: 400;
            background: none;
            border: none;
            padding: 0;
            animation: winnerPulse 2s infinite ease-in-out;
            transition: opacity 0.3s ease;
        }
        #global-leaderboard-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Всего монет за все игры — заставка / экран после смерти */
        #menu-total-coins {
            position: fixed;
            left: 22px;
            bottom: 26px;
            z-index: 380;
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }
        #menu-total-coins .menu-total-coins-icon {
            width: 58px;
            height: 58px;
            object-fit: contain;
            display: block;
            flex-shrink: 0;
            filter: drop-shadow(2px 3px 0 rgba(0, 0, 0, 0.92));
        }
        #menu-total-coins-count {
            font-family: 'Pribambas', 'Impact', sans-serif;
            font-size: 44px;
            font-weight: 700;
            color: #000;
            line-height: 1;
            letter-spacing: 0.02em;
            min-width: 2ch;
            display: inline-flex;
            align-items: center;
            transform: translateY(-8px);
            transition: color 0.12s ease;
        }
        @keyframes menuTotalCoinsBank {
            0% { transform: translateY(-8px) scale(1); color: #000; text-shadow: none; }
            38% { transform: translateY(-8px) scale(1.14); color: #fff; text-shadow: 0 0 14px rgba(255, 255, 255, 0.45); }
            100% { transform: translateY(-8px) scale(1); color: #000; text-shadow: none; }
        }
        #menu-total-coins-count.menu-total-coins-count--bank-anim {
            animation: menuTotalCoinsBank 0.78s cubic-bezier(0.34, 1.1, 0.64, 1) forwards;
        }
        @keyframes winnerPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(0,0,0,0.2)); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 15px rgba(255,255,255,0.5)); }
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
            display: none; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .mobile-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffc240;
            display: none;
            z-index: 1300;
            box-sizing: border-box;
            padding: 16px;
            overflow: auto;
            align-items: center;
            justify-content: center;
        }
        .mobile-screen .modal-box {
            width: min(92vw, 520px);
            max-width: 520px;
            margin: 0;
            transform: none !important;
            box-shadow: 6px 6px 0 #000;
            padding: 18px;
            box-sizing: border-box;
        }
        .mobile-screen .modal-close {
            position: static;
            align-self: flex-end;
            margin: -8px -4px -4px 0;
        }
        .mobile-screen .score-header-row {
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }
        .mobile-screen .search-container {
            width: 100%;
            max-width: none;
        }
        #mobile-score-screen .modal-box {
            max-height: 88vh;
            overflow: auto;
        }
        #mobile-score-screen .score-table {
            font-size: 18px;
        }
        .modal-box {
            background: #ffc240;
            border: 6px solid #000;
            padding: 40px;
            position: relative;
            width: 90%; max-width: 400px;
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: 10px 10px 0 #000;
            transform-origin: center center;
            color: #000;
        }

        /* CUSTOM SCROLLBAR */
        #scoreboard-box::-webkit-scrollbar { width: 12px; }
        #scoreboard-box::-webkit-scrollbar-track { background: #E0A11D; border-left: 4px solid #000; }
        #scoreboard-box::-webkit-scrollbar-thumb { background: #000; border: 2px solid #ffc240; }

        .modal-box h2 { margin: 0 0 10px 0; font-size: 42px; text-align: center; line-height: 1; color: #000; }
        .modal-box input {
            padding: 12px; font-family: 'Pribambas'; font-size: 22px;
            border: 4px solid #000; background: #fff; outline: none;
            box-sizing: border-box; color: #000;
        }
        .modal-close {
            position: absolute; top: 10px; right: 10px;
            width: 35px; height: 35px; background: none;
            border: none; font-size: 40px; font-family: 'Arial', sans-serif;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            z-index: 10; line-height: 1; color: #000 !important;
        }

        .score-header-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; gap: 20px;
        }
        .score-header-row h2 { margin: 0; text-align: left; }
        .search-container {
            position: relative; flex-grow: 1; max-width: 200px;
        }
        .search-container input {
            width: 100%; padding: 8px 35px 8px 10px; font-size: 20px; height: 40px;
        }
        .search-container img {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 20px; pointer-events: none;
        }

        #scoreboard-box { max-width: 600px; width: 95%; max-height: 80vh; overflow-y: auto; padding-top: 40px; }
        .score-table { width: 100%; border-collapse: collapse; font-size: 22px; color: #000; }
        .score-table thead { background: #000; color: #fff; }
        .score-table th { text-align: left; padding: 12px; border: 2px solid #000; line-height: 1; }
        .score-table td { padding: 12px; border: 2px solid #000; line-height: 1; vertical-align: middle; }
        .current-user-row { background: rgba(255,255,255,0.4); font-weight: bold; }

        @keyframes popInCenter { 0% { transform: scale(0); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }
        /* Отдельная анимация: translateZ поднимает слой текста над свечением (моб. WebKit). */
        @keyframes popInFinalScore { 0% { transform: scale(0) translateZ(0); } 70% { transform: scale(1.1) translateZ(0); } 100% { transform: scale(1) translateZ(1px); } }
        @keyframes popInCig { 0% { transform: translate(101px, -176px) scale(0); } 70% { transform: translate(101px, -176px) scale(1.1); } 100% { transform: translate(101px, -176px) scale(1); } }
        @keyframes popInLeaf { 0% { transform: translate(114px, 115px) scale(0); } 70% { transform: translate(114px, 115px) scale(1.1); } 100% { transform: translate(114px, 115px) scale(1); } }
        @keyframes popInStar { 0% { transform: translate(-283px, 51px) scale(0); } 70% { transform: translate(-283px, 51px) scale(1.1); } 100% { transform: translate(-283px, 51px) scale(1); } }
        @keyframes popInDgm { 0% { transform: translate(-305px, -184px) scale(0); } 70% { transform: translate(-305px, -184px) scale(1.1); } 100% { transform: translate(-305px, -184px) scale(1); } }
        @keyframes popInGlow { 0% { transform: translate(calc(-50% - 6px), calc(-50% + 18px)) scale(0); } 70% { transform: translate(calc(-50% - 6px), calc(-50% + 18px)) scale(1.1); } 100% { transform: translate(calc(-50% - 6px), calc(-50% + 18px)) scale(1); } }
        #menu-logo-wrap {
            width: 700px;
            margin-bottom: -90px;
            margin-left: 50px;
            position: relative;
            z-index: 12;
            transform: scale(0);
            animation: popInCenter 0.5s 0.1s cubic-bezier(0.17, 0.67, 0.83, 1) forwards;
        }
        #menu-logo {
            width: 100%;
            height: auto;
            position: relative;
            z-index: 12;
            display: block;
        }
        .menu-hero-wrap {
            position: relative;
            z-index: 15;
            margin-top: 20px;
            margin-left: -50px;
            overflow: visible;
        }
        #menu-hero {
            width: 450px;
            height: auto;
            position: relative;
            z-index: 1;
            display: block;
            transform: scale(0);
            animation: popInCenter 0.5s 0.3s cubic-bezier(0.17, 0.67, 0.83, 1) forwards;
        }
        #menu-logo-wrap, #menu-logo, .menu-hero-wrap, #menu-hero, #menu-glow, #menu-logo-pulse, #obj-cig, #obj-leaf, #obj-star, #obj-dgm { will-change: translate; }
        
        #menu-glow { 
            position: absolute; 
            width: 510px; 
            height: auto; z-index: 2; 
            top: 50%; 
            left: calc(58% + 10px); 
            transform: translate(calc(-50% - 6px), calc(-50% + 18px)) scale(0); 
            pointer-events: none; 
            opacity: 0.78; 
            animation: popInGlow 0.6s 0.2s forwards, pulseGlow 2s 0.8s infinite ease-in-out; 
        }
        #menu-logo-pulse {
            position: absolute;
            top: 52%;
            left: 50%;
            width: 760px;
            height: 320px;
            z-index: 1;
            pointer-events: none;
            border-radius: 50%;
            background: radial-gradient(ellipse at center, rgba(255, 251, 224, 0.88) 0%, rgba(255, 225, 141, 0.62) 24%, rgba(255, 199, 72, 0.3) 52%, rgba(255, 194, 64, 0.05) 74%, rgba(255, 194, 64, 0) 100%);
            filter: blur(6px);
            box-shadow: 0 0 56px rgba(255, 224, 128, 0.34);
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            animation: popInLogoPulse 0.6s 0.2s forwards, pulseLogoGlow 2.8s 0.8s infinite cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        .decor-obj { position: absolute; z-index: 100; pointer-events: none; height: auto; }
        #obj-cig { width: 162px; top: 50%; left: 58%; z-index: 14; transform: translate(101px, -176px) scale(0); animation: popInCig 0.5s 0.5s forwards; }
        #obj-leaf { width: 125px; top: 50%; left: 58%; transform: translate(114px, 115px) scale(0); animation: popInLeaf 0.5s 0.7s forwards; }
        #obj-star { width: 79px; top: 60%; left: 45%; transform: translate(-283px, 51px) scale(0); animation: popInStar 0.5s 0.8s forwards; }
        #obj-dgm { width: 130px; top: 60%; left: 45%; transform: translate(-305px, -184px) scale(0); animation: popInDgm 0.5s 0.6s forwards; }

        #top-info-row {
            transform: scale(0);
            animation: popInCenter 0.5s 0.9s forwards;
            z-index: 300;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px 12px;
            max-width: min(96vw, 720px);
            margin-top: 36px;
            margin-bottom: 5px;
        }
        #top-info-text {
            color: #000;
            font-size: 24px;
            text-align: center;
            line-height: 1.15;
        }
        #menu-over-coins.coin-hud-row {
            display: inline-flex;
            width: auto;
            max-width: none;
            margin: 0;
            justify-content: flex-start;
            align-items: center;
            flex-shrink: 0;
            gap: 8px;
        }
        #menu-over-coins[hidden] { display: none !important; }
        #menu-over-coins .coin-count-value {
            font-size: 24px;
            line-height: 1;
            height: 28px;
            top: 0;
            color: #000;
            text-align: left;
            justify-content: flex-start;
            min-width: 0;
            font-weight: 700;
        }
        #menu-over-coins .coin-hud-icon {
            position: relative;
            top: 0;
            align-self: center;
            flex-shrink: 0;
            transform: translateY(2px);
        }
        #menu-over-coins .coin-hud-dollar {
            transform: none;
        }
        #final-score-display { transform: scale(0); animation: popInFinalScore 0.5s 1.0s forwards; margin-top: 10px; }

        @keyframes pulseGlow { 
            0%, 100% { transform: translate(calc(-50% - 6px), calc(-50% + 18px)) scale(1); opacity: 0.58; } 
            50% { transform: translate(calc(-50% - 6px), calc(-50% + 18px)) scale(1.1); opacity: 0.87; } 
        }
        @keyframes pulseLogoGlow {
            0% {
                transform: translate(-50%, -50%) scale(0.88);
                opacity: 0.78;
            }
            58% {
                transform: translate(-50%, -50%) scale(1.36);
                opacity: 0.38;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.52);
                opacity: 0.14;
            }
        }
        @keyframes popInLogoPulse {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            70% { transform: translate(-50%, -50%) scale(1.08); opacity: 0.75; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.55; }
        }
        
        .menu-score-text { 
            z-index: 300; height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; position: relative; color: #000; line-height: 1; white-space: nowrap; 
        }
        
        #menu-status-wrapper { font-size: 60px; margin-top: -7px; display: flex; align-items: center; gap: 15px; color: #000; }
        .menu-controls-text { position: absolute; top: 75px; color: #c28b1a; font-size: 22px; opacity: 0; transition: opacity 0.2s ease; z-index: 1; text-align: center; margin: 0; }
        .show-text { opacity: 0.9; }

        .ui-panel { position: absolute; top: 50px; width: 100%; display: grid; grid-template-columns: 1fr 1fr 1fr; color: #000; pointer-events: none; z-index: 100; }
        .ui-section { display: flex; flex-direction: column; align-items: center; }
        .stat-label { font-size: 20px; margin-bottom: -5px; }
        .boost-charge-row { display: flex; align-items: center; gap: 8px; width: 100%; max-width: 220px; margin-top: -24px; margin-bottom: 8px; }
        .boost-charge-icon { width: 24px; height: 24px; flex-shrink: 0; color: #9d38ce; align-self: center; transition: color 0.22s ease, filter 0.22s ease; }
        .boost-charge-wrap { flex: 1; min-width: 0; padding: 6px 8px; margin: -6px -8px; box-sizing: content-box; }
        .boost-charge-track { height: 5px; background: #000; border-radius: 0; overflow: hidden; border: 2px solid #000; box-sizing: content-box; transition: box-shadow 0.15s ease, border-color 0.15s ease; }
        .boost-charge-fill { height: 100%; width: 0%; background: #9d38ce; border-radius: 0; transition: width 0.06s linear, box-shadow 0.15s ease, filter 0.15s ease; transform-origin: left center; position: relative; }
        .boost-charge-fill.boost-fill-charge-anim { transition: width 0.45s cubic-bezier(0.22, 1.2, 0.36, 1); }
        @keyframes boostBarVibrate {
            0%, 100% { transform: translate(0, 0); }
            12% { transform: translate(2px, -1.35px); }
            28% { transform: translate(-1.85px, 1.4px); }
            44% { transform: translate(1.65px, 1.5px); }
            60% { transform: translate(-1.55px, -1.1px); }
            76% { transform: translate(1.35px, -1.6px); }
            90% { transform: translate(-1.2px, 1.1px); }
        }
        .boost-charge-row.boost-row-draining .boost-charge-track {
            border-color: #000;
            box-shadow: none;
            overflow: visible;
            animation: boostBarVibrate 0.072s linear infinite;
            will-change: transform;
        }
        @keyframes boostIconDrainGlow {
            0%, 100% { color: #9d38ce; filter: drop-shadow(0 0 4px rgba(157, 56, 206, 0.45)); }
            50% { color: #9d38ce; filter: drop-shadow(0 0 6px rgba(157, 56, 206, 0.58)); }
        }
        .boost-charge-row.boost-row-draining .boost-charge-fill {
            background: #9d38ce;
            filter: drop-shadow(3px 0 5px rgba(157, 56, 206, 1)) drop-shadow(8px 0 14px rgba(157, 56, 206, 0.75)) drop-shadow(14px 0 22px rgba(157, 56, 206, 0.4));
            box-shadow: none;
        }
        .boost-charge-row.boost-row-draining .boost-charge-fill::before {
            display: none;
        }
        .boost-charge-row.boost-row-draining .boost-charge-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: -5px;
            bottom: -5px;
            width: 16px;
            pointer-events: none;
            background: linear-gradient(90deg, rgba(157, 56, 206, 0) 0%, rgba(157, 56, 206, 0.55) 50%, rgba(157, 56, 206, 1) 100%);
        }
        .boost-charge-row.boost-row-draining .boost-charge-icon { animation: boostIconDrainGlow 0.55s ease-in-out infinite; }
        @keyframes boostItemRowFull {
            0%, 100% {
                transform: translate(0, 0);
                filter: drop-shadow(0 0 10px rgba(157, 56, 206, 0.95)) drop-shadow(0 0 22px rgba(210, 165, 255, 0.75)) drop-shadow(0 0 36px rgba(157, 56, 206, 0.4));
            }
            12% { transform: translate(1.35px, -0.9px); filter: drop-shadow(0 0 14px rgba(175, 85, 235, 1)) drop-shadow(0 0 28px rgba(230, 190, 255, 0.9)) drop-shadow(0 0 42px rgba(157, 56, 206, 0.55)); }
            28% { transform: translate(-1.25px, 0.95px); filter: drop-shadow(0 0 12px rgba(157, 56, 206, 1)) drop-shadow(0 0 26px rgba(200, 150, 255, 0.82)); }
            44% { transform: translate(1.15px, 1px); filter: drop-shadow(0 0 16px rgba(190, 100, 245, 1)) drop-shadow(0 0 32px rgba(235, 205, 255, 0.88)); }
            60% { transform: translate(-1.2px, -0.75px); filter: drop-shadow(0 0 11px rgba(157, 56, 206, 0.98)) drop-shadow(0 0 24px rgba(210, 165, 255, 0.78)); }
            76% { transform: translate(1px, -0.9px); filter: drop-shadow(0 0 15px rgba(165, 75, 230, 1)) drop-shadow(0 0 30px rgba(220, 175, 255, 0.85)); }

        .boost-charge-row.boost-row-item-active {

        }
        .boost-charge-row.boost-row-item-active:not(.boost-row-draining) .boost-charge-fill {

        }
        .boost-charge-row.boost-row-item-active:not(.boost-row-draining) .boost-charge-track {

        }
        .boost-charge-row.boost-row-empty .boost-charge-icon { color: #000; filter: none; animation: none; }
        @keyframes boostRewardPulse {
            0% { filter: drop-shadow(0 0 0 transparent); transform: scale(1); }
            30% { filter: drop-shadow(0 0 18px rgba(157, 56, 206, 1)) drop-shadow(0 0 40px rgba(220, 170, 255, 0.95)); transform: scale(1.1); }

        }
        @keyframes boostRewardIcon {

        }
        @keyframes boostRewardTrack {
            0%, 100% { border-color: #000; box-shadow: none; }

        }
        .boost-charge-row.boost-charge-reward-pulse { animation: boostRewardPulse 1.05s cubic-bezier(0.34, 1.45, 0.64, 1) forwards; transform-origin: left center; }
        .boost-charge-row.boost-charge-reward-pulse .boost-charge-fill { animation: boostRewardFillShine 1.05s cubic-bezier(0.34, 1.45, 0.64, 1) forwards; }
        .boost-charge-row.boost-charge-reward-pulse .boost-charge-icon { animation: boostRewardIcon 1.05s ease-out forwards; }
        .boost-charge-row.boost-charge-reward-pulse .boost-charge-track { animation: boostRewardTrack 1.05s ease-out forwards; }
        .boost-charge-row.boost-charge-reward-pulse.boost-row-item-active { animation: boostItemRowFull 0.12s linear infinite; }
        .coin-hud-row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            width: 100%;
            max-width: 220px;
            margin-top: -24px;
            margin-bottom: 8px;
        }
        .coin-count-value {
            font-size: 28px;
            line-height: 1;
            height: 28px;
            font-weight: 700;
            min-width: 1.1em;
            text-align: right;
            color: #000;
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            box-sizing: border-box;
            position: relative;
            top: -8px;
        }
        @keyframes coinHudIconGlowPick {
            0%, 100% { filter: none; }
            40% { filter: drop-shadow(0 0 9px rgba(255, 210, 55, 0.95)) drop-shadow(0 0 18px rgba(255, 230, 100, 0.75)); }
        }
        .coin-hud-icon {
            position: relative;
            top: -5px;
            width: 28px;
            height: 28px;
            flex-shrink: 0;
            box-sizing: border-box;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #ffdc2e;
            border: 2px solid #000;
            font-size: 15px;
            font-weight: 800;
            line-height: 0;
            color: #000;
            font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
            filter: none;
        }
        .coin-hud-icon::before {
            content: '';
            position: absolute;
            inset: 2px;
            border: 1px solid #000;
            border-radius: 50%;
            box-sizing: border-box;
            pointer-events: none;
        }
        .coin-hud-dollar {
            position: relative;
            z-index: 1;
            display: block;
            line-height: 1;
            transform: translateY(-0.03em);
        }
        @keyframes coinPickPulse {
            0% { transform: scale(1); color: #000; text-shadow: none; }
            40% { transform: scale(1.14); color: #fff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.9); }
            100% { transform: scale(1); color: #000; text-shadow: none; }
        }
        .coin-hud-row.coin-pick-pulse .coin-count-value {
            animation: coinPickPulse 0.48s cubic-bezier(0.34, 1.45, 0.64, 1);
        }
        .coin-hud-row.coin-pick-pulse .coin-hud-icon {
            animation: coinPickPulse 0.48s cubic-bezier(0.34, 1.45, 0.64, 1), coinHudIconGlowPick 0.48s ease-out;
        }
        @keyframes boostRewardFillShine {
            0% { filter: brightness(1); box-shadow: none; transform: scaleX(0.94); background: #9d38ce; }
            40% { filter: brightness(1.25); box-shadow: none; transform: scaleX(1); background: #9d38ce; }
            100% { filter: brightness(1); box-shadow: none; transform: scaleX(1); background: #9d38ce; }
        }
        .stat-value { font-size: 44px; display: inline-block; transition: transform 0.2s ease; line-height: 1; }
        
        .killed-container { 
            display: flex; align-items: center; font-size: 52px; line-height: 1; margin-top: 9px; white-space: nowrap; transition: color 0.2s ease, transform 0.2s ease; 
        }
        @keyframes killedPulse {
            0% { transform: scale(1); color: #000; }
            50% { transform: scale(1.25); color: #fff; text-shadow: 0 0 15px rgba(255,255,255,1); }
            100% { transform: scale(1); color: #000; }
        }
        .pulse-bonus { animation: killedPulse 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #enemies { margin-left: 15px; display: inline-block; }
        #hp-container { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); width: 280px; height: 12px; border: 2px solid #000; z-index: 110; overflow: visible; }

        #death-revive-layer {
            position: fixed;
            inset: 0;
            z-index: 120;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.35);
        }
        #death-revive-layer.death-revive-layer--visible {
            display: flex;
            pointer-events: auto;
        }
        .death-revive-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 22px 28px 20px;
            background: #ffc240;
            border: 4px solid #000;
            box-shadow: 8px 8px 0 #000;
            min-width: 220px;
            max-width: 92vw;
        }
        #death-revive-countdown {
            font-size: 52px;
            line-height: 1;
            letter-spacing: 0.04em;
            text-shadow: 3px 3px 0 rgba(255, 255, 255, 0.85);
            transform: translateY(-8px);
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum" 1;
        }
        #death-revive-btn {
            min-width: 200px;
            background: #ffdb8e !important;
            color: #000 !important;
            border: 4px solid #000 !important;
            box-shadow: 5px 5px 0 #000;
        }
        #death-revive-btn:hover {
            background: #ffe8b8 !important;
            color: #000 !important;
        }
        #death-revive-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0 #000;
        }
        #death-revive-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            filter: grayscale(0.2);
        }
        .death-revive-bank {
            display: inline-flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 26px;
            line-height: 1;
        }
        .death-revive-bank img {
            width: 28px;
            height: 28px;
            display: block;
            flex-shrink: 0;
            object-fit: contain;
        }
        #death-revive-bank-count {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 28px;
            line-height: 1;
            font-size: 26px;
            margin: 0;
            padding: 0;
            font-variant-numeric: tabular-nums;
        }
        #hp-bar { width: 100%; height: 100%; background: #fff; transition: width 0.2s ease; }
        @keyframes hpHealGlow {
            0% { box-shadow: 0 0 0 0 rgba(255,255,255,0), 0 0 0 0 rgba(180,230,255,0); filter: brightness(1); }
            40% { box-shadow: 0 0 12px 3px rgba(255,255,255,0.95), 0 0 24px 6px rgba(200,235,255,0.55); filter: brightness(1.4); }
            100% { box-shadow: 0 0 0 0 rgba(255,255,255,0), 0 0 0 0 rgba(180,230,255,0); filter: brightness(1); }
        }
        .hp-heal-pulse { animation: hpHealGlow 0.55s ease-out; }
        .km-unit { font-size: 24px; margin-left: 3px; }

        @media (max-width: 768px) { 
            .ui-panel {
                top: 42px;
                left: 0;
                width: 100%;
                box-sizing: border-box;
                padding: 0 8px;
                grid-template-columns: 1fr auto 1fr;
                transform: none;
            }
            .ui-panel .stat-label { font-size: 16px; }
            .boost-charge-row { max-width: 96px; margin-top: -18px; margin-bottom: 6px; gap: 6px; }
            .boost-charge-icon { width: 20px; height: 20px; }
            .boost-charge-track { height: 4px; }
            .coin-hud-row { max-width: 136px; margin-top: -18px; margin-bottom: 6px; gap: 6px; }
            .coin-hud-row .coin-hud-icon { top: 0; }
            #coin-hud-row .coin-count-value { top: 3px; }
            .coin-count-value { font-size: 22px; line-height: 1; height: 22px; top: -6px; }
            .coin-hud-icon { width: 22px; height: 22px; font-size: 12px; border-width: 2px; top: -3px; }
            .coin-hud-icon::before { inset: 2px; }
            .ui-panel .ui-section:first-child .stat-value,
            .ui-panel .ui-section:last-child .stat-value { font-size: 28px; }
            .stat-value { font-size: 32px; } 
            .killed-container { font-size: 32px; }
            .ui-panel .ui-section:first-child { 
                align-items: flex-start;
                padding-left: 0 !important;
            }
            .ui-panel .ui-section:last-child { 
                align-items: flex-end;
                padding-right: 0 !important;
            }
            #hp-container { 
                top: 28px;
                width: 170px;
                height: 9px;
                border-width: 2px;
            }
            .auth-btn-group .dogma-btn { font-size: 22px; padding: 0 16px; height: 54px; border-width: 3px; }
            .user-nick-btn { font-size: 22px; height: 54px; width: auto; max-width: 210px; gap: 2px; padding: 0 8px 0 4px; }
            .user-nick-text-clip { max-width: 145px; }
            .user-nick-text-clip { transform: translateY(3px); }
            .user-nick-btn img { height: 21px; margin-right: -1px; margin-left: -6px; }
            .icon-btn { width: 54px; height: 54px; }
            #global-leaderboard-btn { width: 70px; height: 70px; bottom: 20px; right: 20px; }
            .modal-close { top: 5px; right: 5px; }
            .score-header-row { flex-direction: column; align-items: flex-start; gap: 10px; }
            #auth-top-layer {
                top: 10px;
                right: 10px;
                padding: 0;
            }
            #dgm-top-logo-link {
                top: 12px;
                left: 12px;
                width: 88px;
                height: 88px;
            }
            .mobile-screen { padding: 12px; }
            .mobile-screen .modal-box {
                width: min(94vw, 460px);
                padding: 14px;
                border-width: 5px;
                box-shadow: 5px 5px 0 #000;
            }
            .mobile-screen .modal-box h2 { font-size: 32px; }
            #mobile-score-screen .score-table { font-size: 16px; }
            #top-info-text { font-size: 22px; }
            #menu-over-coins .coin-count-value {
                font-size: 23px;
                height: 28px;
            }
            #menu-over-coins .coin-hud-icon {
                top: 0;
                width: 26px;
                height: 26px;
                font-size: 14px;
                transform: translateY(-2px);
            }
            #top-info-row { gap: 8px 12px; }
        }

        /* Монеты на заставке: узкий экран ИЛИ телефон в альбоме (ширина часто >768px — отдельно от блока выше). */
        @media (max-width: 768px),
               screen and (orientation: landscape) and (max-height: 500px) and (min-width: 769px) and (max-width: 1024px) {
            #menu-total-coins {
                left: 12px;
                bottom: 14px;
                gap: 8px;
            }
            #menu-total-coins .menu-total-coins-icon {
                width: 40px;
                height: 40px;
            }
            #menu-total-coins-count {
                font-size: 28px;
                transform: translateY(5px);
            }
            @keyframes menuTotalCoinsBank {
                0% { transform: translateY(5px) scale(1); color: #000; text-shadow: none; }
                38% { transform: translateY(5px) scale(1.12); color: #fff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.45); }
                100% { transform: translateY(5px) scale(1); color: #000; text-shadow: none; }
            }
        }

        /* Подсказка зон тача: прыжок — буст — стрельба (только узкий экран). */
        #mobile-touch-nav {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 14px;
            z-index: 95;
            display: none;
            justify-content: space-around;
            align-items: center;
            gap: 0;
            padding: 6px 12px calc(6px + env(safe-area-inset-bottom, 0px));
            box-sizing: border-box;
            pointer-events: none;
        }
        #mobile-touch-nav.mobile-touch-nav--hidden {
            display: none !important;
        }
        @media (max-width: 768px) {
            #mobile-touch-nav:not(.mobile-touch-nav--hidden) {
                display: flex;
            }
        }
        .mobile-touch-nav-zone {
            flex: 0 0 auto;
            width: clamp(40px, 11vw, 52px);
            height: clamp(40px, 11vw, 52px);
            border-radius: 50%;
            box-sizing: border-box;
            background: transparent;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            transition: border-color 0.14s ease, box-shadow 0.14s ease;
        }
        .mobile-touch-nav-zone--jump {
            border: 3px solid rgba(255, 255, 255, 0.34);
        }
        .mobile-touch-nav-zone--boost {
            border: 3px solid rgba(157, 56, 206, 0.34);
        }
        .mobile-touch-nav-zone--fire {
            border: 3px solid rgba(255, 220, 46, 0.34);
        }
        .mobile-touch-nav-zone--jump:active,
        .mobile-touch-nav-zone--jump.mobile-touch-nav-zone--pressed {
            border-color: rgba(255, 255, 255, 0.72);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.38), 0 0 22px rgba(255, 255, 255, 0.18);
        }
        .mobile-touch-nav-zone--boost:active,
        .mobile-touch-nav-zone--boost.mobile-touch-nav-zone--pressed {
            border-color: rgba(187, 95, 228, 0.85);
            box-shadow: 0 0 10px rgba(157, 56, 206, 0.42), 0 0 24px rgba(157, 56, 206, 0.22);
        }
        .mobile-touch-nav-zone--fire:active,
        .mobile-touch-nav-zone--fire.mobile-touch-nav-zone--pressed {
            border-color: rgba(255, 230, 120, 0.95);
            box-shadow: 0 0 10px rgba(255, 210, 55, 0.45), 0 0 22px rgba(255, 200, 40, 0.2);
        }
        @media (max-width: 768px) and (orientation: landscape),
               (max-width: 768px) and (max-height: 480px) {
            #mobile-touch-nav .mobile-touch-nav-zone--boost {
                transform: translateX(calc(-5vw - 8px));
            }
            #mobile-touch-nav .mobile-touch-nav-zone--boost:active,
            #mobile-touch-nav .mobile-touch-nav-zone--boost.mobile-touch-nav-zone--pressed {
                transform: translateX(calc(-5vw - 8px));
            }
        }

        /* Альбом / низкий экран: одна линия буст — HP — монеты (orientation иногда глючит — дублируем max-height). */
        @media (max-width: 768px) and (orientation: landscape),
               (max-width: 768px) and (max-height: 480px) {
            .ui-panel {
                top: 28px;
            }
            /* Общая «полоса» HUD: центр на 28px + 13px = 41px от верха вьюпорта */
            .boost-charge-row {
                max-width: 72px;
                min-height: 26px;
                margin-top: 0;
                margin-bottom: 2px;
                align-items: center;
            }
            .boost-charge-wrap {
                padding: 0 4px;
                margin: 0 -4px;
            }
            .coin-hud-row {
                min-height: 26px;
                margin-top: 0;
                margin-bottom: 2px;
                align-items: center;
            }
            .coin-count-value,
            #coin-hud-row .coin-count-value {
                top: 0 !important;
                align-self: center;
            }
            .coin-hud-icon {
                top: 0 !important;
                align-self: center;
            }
            /* Центр полоски HP совпадает с центром рядов буста и монет (~41px) */
            #hp-container {
                top: 35px;
                width: 118px;
                height: 8px;
            }
            .killed-container {
                margin-top: 10px;
            }
        }
    </style>
</head>

<script>
// --- AUTH LOGIC ---
let currentUser = null;
let currentUserUid = null;
let isModalOpen = false;
let globalScores = [];

let firebaseEnabled = false;
let fbAuth = null;
let fbDb = null;
let mobileAuthMode = 'reg';
let nickMarqueeInterval = null;
let nickMarqueeStartTimeout = null;

const firebaseConfig = {
    apiKey: "AIzaSyDxUdN8_EzS7c_bOjY1_kmJrHf4mF9e5qY",
    authDomain: "dogmamangame.firebaseapp.com",
    projectId: "dogmamangame",
    storageBucket: "dogmamangame.firebasestorage.app",
    messagingSenderId: "777475159406",
    appId: "1:777475159406:web:19de35bcfb1195074d7d7f"
};

function isFirebaseConfigured() {
    return Object.values(firebaseConfig).every((v) => typeof v === 'string' && !v.includes('YOUR_'));
}

function nicknameToEmail(name) {
    const normalized = name.trim().toLowerCase();
    // encodeURIComponent стабильно кодирует кириллицу и спецсимволы в hex-последовательность.
    // Удаляем '%' и используем как безопасную уникальную часть email.
    const encoded = encodeURIComponent(normalized).replace(/%/g, '').slice(0, 60);
    return `u${encoded || 'player'}@dogma.local`;
}

function legacyNicknameToEmail(name) {
    const normalized = name.trim().toLowerCase().replace(/[^a-z0-9._-]/g, '');
    return `${normalized || 'player'}@dogma.local`;
}

function nicknameEmailCandidates(name) {
    const primary = nicknameToEmail(name);
    const legacy = legacyNicknameToEmail(name);
    return primary === legacy ? [primary] : [primary, legacy];
}

function normalizeTelegramUsername(value) {
    return (value || '').trim().replace(/^@+/, '');
}

function isValidTelegramUsername(value) {
    // Telegram username: 5-32 chars, letters/digits/underscore, no underscore at edges.
    return /^[A-Za-z0-9](?:[A-Za-z0-9_]{3,30}[A-Za-z0-9])$/.test(value);
}

function stopNicknameMarquee() {
    if (nickMarqueeInterval) clearInterval(nickMarqueeInterval);
    if (nickMarqueeStartTimeout) clearTimeout(nickMarqueeStartTimeout);
    nickMarqueeInterval = null;
    nickMarqueeStartTimeout = null;
    const nicknameEl = document.getElementById('display-nickname');
    if (nicknameEl) nicknameEl.style.transform = 'translateX(0px)';
}

function restartNicknameMarquee() {
    stopNicknameMarquee();
    const nicknameEl = document.getElementById('display-nickname');
    const clipEl = document.querySelector('.user-nick-text-clip');
    if (!nicknameEl || !clipEl) return;

    requestAnimationFrame(() => {
        const overflow = nicknameEl.scrollWidth - clipEl.clientWidth;
        if (overflow <= 2) return;

        const maxShift = overflow + 8;
        let showStart = false;
        const toggleShift = () => {
            nicknameEl.style.transform = showStart ? 'translateX(0px)' : `translateX(-${maxShift}px)`;
            showStart = !showStart;
        };

        nickMarqueeStartTimeout = setTimeout(() => {
            toggleShift();
            nickMarqueeInterval = setInterval(toggleShift, 3600);
        }, 1200);
    });
}

function initFirebase() {
    if (typeof firebase === 'undefined') return;
    if (!isFirebaseConfigured()) return;
    try {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        fbAuth = firebase.auth();
        fbDb = firebase.firestore();
        firebaseEnabled = true;
    } catch (err) {
        firebaseEnabled = false;
    }
}

function applyAuthState(name, uid = null, opts) {
    currentUser = name ? normalizeTelegramUsername(name) : null;
    currentUserUid = uid || null;
    const guestGroup = document.getElementById('guest-group');
    const userGroup = document.getElementById('user-group');
    const nicknameEl = document.getElementById('display-nickname');

    if (currentUser) {
        nicknameEl.innerText = currentUser;
        guestGroup.style.display = 'none';
        userGroup.style.display = 'flex';
        restartNicknameMarquee();
    } else {
        nicknameEl.innerText = "ГОСТЬ";
        guestGroup.style.display = 'flex';
        userGroup.style.display = 'none';
        stopNicknameMarquee();
    }
    if (!opts || !opts.skipCoinReload) {
        loadTotalCoinsForCurrentAuth();
    }
}

function persistCurrentUser() {
    try {
        if (currentUser) localStorage.setItem('dogma_current_user', currentUser);
        else localStorage.removeItem('dogma_current_user');
    } catch (err) {}
}

async function performAuth(type, name, pass) {
    name = normalizeTelegramUsername(name);
    if (!name || !pass) return false;

    if (!firebaseEnabled) {
        applyAuthState(name, null);
        persistCurrentUser();
        return true;
    }

    const emails = nicknameEmailCandidates(name);
    const email = emails[0];
    try {
        let cred;
        if (type === 'reg') {
            cred = await fbAuth.createUserWithEmailAndPassword(email, pass);
            await fbDb.collection('players').doc(cred.user.uid).set({
                nickname: name,
                nicknameUpper: name.toUpperCase(),
                nicknameLower: name.toLowerCase(),
                kills: 0,
                distKm: 0,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            applyAuthState(name, cred.user.uid);
        } else {
            let lastErr = null;
            for (const candidate of emails) {
                try {
                    cred = await fbAuth.signInWithEmailAndPassword(candidate, pass);
                    break;
                } catch (signInErr) {
                    lastErr = signInErr;
                }
            }
            if (!cred) throw lastErr;
            const snap = await fbDb.collection('players').doc(cred.user.uid).get();
            const profileName = snap.exists && snap.data().nickname ? snap.data().nickname : name;
            applyAuthState(profileName, cred.user.uid);
        }
        persistCurrentUser();
        return true;
    } catch (err) {
        const code = err && err.code ? err.code : '';

        if (type === 'reg' && code === 'auth/email-already-in-use') {
            try {
                // Если ник уже существует, пытаемся войти с указанным паролем.
                const cred = await fbAuth.signInWithEmailAndPassword(email, pass);
                const snap = await fbDb.collection('players').doc(cred.user.uid).get();
                const profileName = snap.exists && snap.data().nickname ? snap.data().nickname : name;
                applyAuthState(profileName, cred.user.uid);
                persistCurrentUser();
                alert('Этот username уже зарегистрирован. Выполнен вход.');
                return true;
            } catch (loginErr) {
                alert('Этот username уже зарегистрирован. Нажмите "ВХОД" и введите верный пароль.');
                return false;
            }
        }

        if (code === 'auth/invalid-credential' || code === 'auth/wrong-password') {
            alert('Неверный пароль или Telegram username.');
            return false;
        }

        if (code === 'auth/too-many-requests') {
            alert('Слишком много попыток. Попробуйте чуть позже.');
            return false;
        }

        alert('Ошибка авторизации: ' + (err.message || 'проверьте данные'));
        return false;
    }
}

async function saveCurrentUserStats() {
    if (!firebaseEnabled || !currentUserUid) return;
    try {
        const docRef = fbDb.collection('players').doc(currentUserUid);
        const snap = await docRef.get();
        const prev = snap.exists ? snap.data() : {};
        const nextKills = Math.max(prev.kills || 0, enemiesDefeated || 0);
        const nextDist = Math.max(prev.distKm || 0, Number((distance / 1000).toFixed(3)));
        await docRef.set({
            nickname: currentUser,
            nicknameUpper: (currentUser || 'ГОСТЬ').toUpperCase(),
            nicknameLower: (currentUser || 'ГОСТЬ').toLowerCase(),
            kills: nextKills,
            distKm: nextDist,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
    } catch (err) {}
}

async function loadCloudScores() {
    if (!firebaseEnabled || !fbDb) return null;
    try {
        const snap = await fbDb.collection('players').orderBy('kills', 'desc').limit(500).get();
        const items = [];
        snap.forEach((doc) => {
            const d = doc.data();
            items.push({
                name: normalizeTelegramUsername(d.nickname || 'igrok'),
                kills: Number(d.kills || 0),
                dist: Number(d.distKm || 0).toFixed(3),
                current: doc.id === currentUserUid
            });
        });
        return items;
    } catch (err) {
        return null;
    }
}


function openModal(id) {
    if (isMobileDevice && (id === 'reg-modal' || id === 'login-modal')) {
        openMobileAuth(id === 'reg-modal' ? 'reg' : 'login');

    document.getElementById(id).style.display = 'flex';
    isModalOpen = true;

function closeModal(id) {

async function handleAuth(type) {
    const input = type === 'reg' ? document.getElementById('reg-name') : document.getElementById('login-name');
    const passInput = type === 'reg' ? document.getElementById('reg-pass') : document.getElementById('login-pass');
    let name = normalizeTelegramUsername(input.value);
    const pass = passInput.value.trim();
    if (!name || !pass) return;
    if (!isValidTelegramUsername(name)) {
        alert('Telegram username должен быть 5-32 символа, содержать только буквы, цифры и "_", без "_" в начале/конце.');
        return;
    }
    input.value = name;
    const ok = await performAuth(type, name, pass);
    if (!ok) return;
    
    closeModal(type === 'reg' ? 'reg-modal' : 'login-modal');
}

async function logout() {
    if (firebaseEnabled && fbAuth) {
        try { await fbAuth.signOut(); } catch (err) {}
    }
    applyAuthState(null);
    persistCurrentUser();
}

    }, 80);
}

function renderScoreTable(data) {
    const body = document.getElementById('score-body');
    const mobileBody = document.getElementById('mobile-score-body');
    if (body) body.innerHTML = '';
    if (mobileBody) mobileBody.innerHTML = '';

    data.forEach((d) => {
        const originalIndex = globalScores.findIndex(item => item.name === d.name && item.kills === d.kills) + 1;
        const cleanName = normalizeTelegramUsername(d.name || 'igrok');
        const rowHtml = `<td>${originalIndex}</td><td>@${cleanName}</td><td>${d.kills}</td><td>${d.dist}</td>`;

        if (body) {
            const row = document.createElement('tr');
            if (d.current) row.className = 'current-user-row';
            row.innerHTML = rowHtml;
            body.appendChild(row);
        }
        if (mobileBody) {
            const mobileRow = document.createElement('tr');
            if (d.current) mobileRow.className = 'current-user-row';
            mobileRow.innerHTML = rowHtml;
            mobileBody.appendChild(mobileRow);
        }
    });
}

function filterScoreboard() {
    const mobileScreen = document.getElementById('mobile-score-screen');
    const useMobileSearch = isMobileDevice && mobileScreen && mobileScreen.style.display === 'flex';
    const searchInput = useMobileSearch ? document.getElementById('mobile-score-search') : document.getElementById('score-search');
    const val = normalizeTelegramUsername(searchInput.value).toUpperCase();
    const filtered = globalScores.filter(d => normalizeTelegramUsername(d.name).toUpperCase().startsWith(val));

function adjustMenuScale() {
    const comp = document.getElementById('menu-comp');
    if(!comp) return;
    const baseW = 800; const baseH = 800;
    const screenW = window.innerWidth * 0.95; const screenH = window.innerHeight * 0.95;
    const scale = Math.min(screenW / baseW, screenH / baseH);
    comp.style.transform = `scale(${scale})`;

    const modals = document.querySelectorAll('.modal-box');
    modals.forEach(m => {
        const modalScale = isMobileDevice ? 1 : scale;
        m.style.transform = `scale(${modalScale})`;
    });

    const topAuth = document.getElementById('auth-top-layer');
    if(topAuth) {
        // Уменьшаем масштаб на мобилках чуть сильнее, чтобы не вылезало
        const authScale = window.innerWidth < 600 ? Math.min(scale * 0.9, 0.8) : Math.max(scale, 0.7);
        topAuth.style.transform = `scale(${authScale})`;
    }
}
window.addEventListener('resize', adjustMenuScale);
window.addEventListener('DOMContentLoaded', adjustMenuScale);
window.addEventListener('resize', restartNicknameMarquee);

        await document.fonts.ready;
        if (document.fonts.check('1em Pribambas')) {
            document.body.style.fontFamily = "'Pribambas', 'Impact', sans-serif";
            adjustMenuScale();
        }
    } catch (err) {}
}

const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
let lastTouchEnd = 0;

window.addEventListener('DOMContentLoaded', () => {
    initFirebase();

    try {
        const savedUser = localStorage.getItem('dogma_current_user');
        if (firebaseEnabled && fbAuth) {
            if (savedUser) applyAuthState(savedUser, null, { skipCoinReload: true });
            else applyAuthState(null, null, { skipCoinReload: true });
        } else if (savedUser) {
            applyAuthState(savedUser);
        } else {
            applyAuthState(null);
        }
    } catch (err) {}

    if (firebaseEnabled && fbAuth) {
        fbAuth.onAuthStateChanged(async (user) => {
            if (!user) {
                applyAuthState(null, null);
                persistCurrentUser();
                return;
            }
            currentUserUid = user.uid;
            try {
                const snap = await fbDb.collection('players').doc(user.uid).get();
                const profileName = snap.exists && snap.data().nickname ? snap.data().nickname : (currentUser || 'ГОСТЬ');
                applyAuthState(profileName, user.uid);
                persistCurrentUser();
            } catch (err) {
                applyAuthState(currentUser || 'ГОСТЬ', user.uid);
                persistCurrentUser();
            }
        });

    const gen = coinBankAnimGeneration;

    if (menuTotalCoinsCountEl) menuTotalCoinsCountEl.classList.add('menu-total-coins-count--bank-anim');
    if (!isMobileDevice) {

    const from = totalCoinsAllTime;
    const to = totalCoinsAllTime + roundCoins;
    const t0 = performance.now();
    const step = (now) => {
        if (gen !== coinBankAnimGeneration) return;
        const u = Math.min(1, (now - t0) / COIN_BANK_ANIM_MS);
        const cur = Math.round(from + (to - from) * u);
        setMenuTotalCoinsCountDisplay(cur);
        if (u < 1) requestAnimationFrame(step);
        else {
            totalCoinsAllTime = to;
            persistTotalCoins();
            if (menuTotalCoinsCountEl) menuTotalCoinsCountEl.classList.remove('menu-total-coins-count--bank-anim');
            if (onComplete) onComplete();
        }
    };

            const wasHeld = shiftBoostKeyHeld;
            if (!e.repeat && !wasHeld && boostFuel > 0) { sounds.boost2.volume = BOOST2_VOL_ALT; sounds.boost2.currentTime = 0; sounds.boost2.play(); }
            shiftBoostKeyHeld = true;
        }
        return;
    }
    if (e.code === 'KeyA' && !isGameOver && !isFirstRun) { isFiring = true; if ((ammo > 0) && superShotTimer <= 0 && Date.now() - lastShotTime > 110) { fireBullet(); lastShotTime = Date.now(); } }
}, true);
window.addEventListener('keyup', (e) => {
    if (e.code === 'KeyA') isFiring = false;
    if (e.code === 'KeyD') shiftBoostKeyHeld = false;
}, true);
window.addEventListener('blur', () => { shiftBoostKeyHeld = false; mobileCenterBoostHeld = false; });
window.addEventListener('touchstart', (e) => {
    if (isModalOpen) return;
    const target = e.target;
    if (target.tagName === 'BUTTON' || target.closest('button') || target.closest('#global-leaderboard-btn')) return;
    e.preventDefault();
    const touchX = e.touches[0].clientX, w = window.innerWidth;
    if (isFirstRun || (isGameOver && canRestart && !reviveOfferActive)) { start(); return; }
    if (isGameOver) return;
    if (isMobileDevice) {
        const t1 = w / 3, t2 = (2 * w) / 3;
        const { prev, now } = syncMobileCenterBoostFromTouches(e);
        if (now && !prev && boostFuel > 0 && !isFirstRun && !isGameOver) { sounds.boost2.volume = 0.7; sounds.boost2.currentTime = 0; sounds.boost2.play(); }
        if (touchX < t1) hero.jump();
        else if (touchX >= t2) {
            isFiring = true;
            if ((ammo > 0) && superShotTimer <= 0 && Date.now() - lastShotTime > 110) { fireBullet(); lastShotTime = Date.now(); }
        }
    } else {
        const mid = w / 2;
        if (touchX < mid) hero.jump(); else { isFiring = true; if ((ammo > 0) && superShotTimer <= 0 && Date.now() - lastShotTime > 110) { fireBullet(); lastShotTime = Date.now(); } }
    }
}, { passive: false });
window.addEventListener('touchend', (e) => {
    if (isMobileDevice) syncMobileCenterBoostFromTouches(e);
    const w = window.innerWidth, rightStart = isMobileDevice ? (2 * w) / 3 : w / 2;
    let stillFiring = false;
    for (let i = 0; i < e.touches.length; i++) { if (e.touches[i].clientX >= rightStart) stillFiring = true; }
    if (!stillFiring) isFiring = false;
});
window.addEventListener('touchcancel', (e) => { if (isMobileDevice) syncMobileCenterBoostFromTouches(e); });
if (deathReviveBtnEl) deathReviveBtnEl.addEventListener('click', () => performReviveFromDeath());
</script>
