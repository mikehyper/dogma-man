    <style>

            src: local('Pribambas'),

        body, html {

            background-color: #ffc240;

        canvas { display: block; image-rendering: pixelated; }

        @keyframes popInCenter { 0% { transform: scale(0); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }

<script>
// --- ГЛОБАЛЬНАЯ ПРОВЕРКА МОБИЛЬНОГО УСТРОЙСТВА ---
const IS_MOBILE_DEVICE = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

// --- НАСТРОЙКИ ГРОМКОСТИ ---
const VOLUMES = {
    bg: IS_MOBILE_DEVICE ? 0 : 0.6,
    mainMusic: IS_MOBILE_DEVICE ? 0 : 0.3,
    jump: IS_MOBILE_DEVICE ? 0 : 0.5,
    land: IS_MOBILE_DEVICE ? 0 : 0.9,
    shoot: IS_MOBILE_DEVICE ? 0 : 0.6,
    death_enemy: IS_MOBILE_DEVICE ? 0 : 0.8,
    life: IS_MOBILE_DEVICE ? 0 : 0.6,
    shield: IS_MOBILE_DEVICE ? 0 : 0.6,
    ammo: IS_MOBILE_DEVICE ? 0 : 0.9,
    super: IS_MOBILE_DEVICE ? 0 : 0.4,
    boost: IS_MOBILE_DEVICE ? 0 : 0.6,
    cool: IS_MOBILE_DEVICE ? 0 : 1,
    death: IS_MOBILE_DEVICE ? 0 : 0.6,
    woosh: IS_MOBILE_DEVICE ? 0 : 0.4, 
    power: IS_MOBILE_DEVICE ? 0 : 0.4,

    shh: IS_MOBILE_DEVICE ? 0 : 0.9
};

function adjustMenuScale() {
    const comp = document.getElementById('menu-comp');
    if(!comp) return;
    const baseW = 800; const baseH = 800;
    const screenW = window.innerWidth * 0.95; const screenH = window.innerHeight * 0.95;
    const scale = Math.min(screenW / baseW, screenH / baseH);
    comp.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', adjustMenuScale);
window.addEventListener('DOMContentLoaded', adjustMenuScale);

async function initFonts() {
    try {
        await document.fonts.ready;
        if (document.fonts.check('1em Pribambas')) {
            document.body.style.fontFamily = "'Pribambas', 'Impact', sans-serif";
            adjustMenuScale();
        }
    } catch (err) {}
}
initFonts();

window.addEventListener('DOMContentLoaded', () => {
    const ctrlText = document.getElementById('controls-text');
    if (IS_MOBILE_DEVICE) ctrlText.innerText = "ТАП СЛЕВА: ПРЫГАЙ | ТАП СПРАВА: СТРЕЛЯЙ";
});

const sounds = {
    bg: new Audio('sound/start_sound.mp3'),
    m1: new Audio('sound/main_sound.mp3'),
    m2: new Audio('sound/main2_sound.mp3'),
    m3: new Audio('sound/main3_sound.mp3'),
    jump: new Audio('sound/jump.wav'),
    land: new Audio('sound/land.wav'),
    shoot: new Audio('sound/shoot.wav'),
    death_enemy: new Audio('sound/death_enemy.wav'),
    life: new Audio('sound/life.wav'),
    shield: new Audio('sound/shield.wav'),
    ammo: new Audio('sound/ammo.wav'),
    super: new Audio('sound/super.wav'),
    boost: new Audio('sound/boost.wav'),
    cool: new Audio('sound/cool.wav'),
    death: new Audio('sound/death.wav'),
    woosh: new Audio('sound/woosh.wav'), 
    power: new Audio('sound/power.wav'),
    ice: new Audio('sound/ice.wav'),
    shh: new Audio('sound/shh.wav')   
};

let mainPlaylist = [sounds.m1, sounds.m2, sounds.m3];
let currentTrackIdx = Math.floor(Math.random() * mainPlaylist.length);
let currentTrack = mainPlaylist[currentTrackIdx];

mainPlaylist.forEach((track, index) => {
    track.volume = VOLUMES.mainMusic;
    track.addEventListener('ended', () => {
        currentTrackIdx = (currentTrackIdx + 1) % mainPlaylist.length;
        currentTrack = mainPlaylist[currentTrackIdx];
        currentTrack.currentTime = 0;
        if (currentTrack.volume > 0) currentTrack.play();
    });
});

sounds.bg.loop = true; sounds.bg.volume = VOLUMES.bg;
sounds.jump.volume = VOLUMES.jump;
sounds.land.volume = VOLUMES.land;
sounds.shoot.volume = VOLUMES.shoot;
sounds.death_enemy.volume = VOLUMES.death_enemy;
sounds.life.volume = VOLUMES.life;
sounds.shield.volume = VOLUMES.shield;
sounds.ammo.volume = VOLUMES.ammo;
sounds.super.volume = VOLUMES.super;
sounds.boost.volume = VOLUMES.boost;
sounds.cool.volume = VOLUMES.cool;
sounds.death.volume = VOLUMES.death;
sounds.woosh.loop = true; sounds.woosh.volume = VOLUMES.woosh;
sounds.power.loop = true; sounds.power.volume = VOLUMES.power;
sounds.ice.volume = VOLUMES.ice;
sounds.shh.volume = VOLUMES.shh;

function playShh() {}
function showMenuSounds() {}

const loadImg = (n) => { const i = new Image(); i.src = 'img/' + n; return i; };
const heroRun = ['run1.png','run2.png','run3.png','run4.png','run5.png','run6.png'].map(loadImg);
const heroRunShoot = ['run_s1.png','run_s2.png','run_s3.png','run_s4.png','run_s5.png','run_s6.png'].map(loadImg);
const heroJump = loadImg('jump.png'), heroLand = loadImg('land.png'), heroJumpShoot = loadImg('jump_s.png'), heroLandShoot = loadImg('land_s.png');
const heroBoost = loadImg('boost_run.png'), heroBoostShoot = loadImg('boost_shoot.png');
const ammoImg = loadImg('item_ammo.png'), lifeImg = loadImg('item_life.png'), boostImg = loadImg('item_boost.png'), superShotImg = loadImg('item_super.png'), shieldImg = loadImg('item_shield.png'), iceItemImg = loadImg('item_ice.png');
const cigImg = loadImg('cig.png');

const cityline1Images = []; for(let i=1; i<=14; i++) cityline1Images.push(loadImg(`cityline1_${i}.png`));
const cityline2Images = []; for(let i=1; i<=14; i++) cityline2Images.push(loadImg(`cityline2_${i}.png`));
const mountainObjectsImages = []; for(let i=1; i<=19; i++) mountainObjectsImages.push(loadImg(`mountains${i}.png`));
const cloudsImages = []; for(let i=1; i<=18; i++) cloudsImages.push(loadImg(`clouds${i}.png`));

const zombieImages = [], flyingImages = [];
function preloadEnemies() {
    for(let i=1; i<=20; i++) { let img = new Image(); img.src = `img/z${i}.png`; img.onload = () => zombieImages.push(img); }
    for(let i=1; i<=10; i++) { let img = new Image(); img.src = `img/fly${i}.png`; img.onload = () => flyingImages.push(img); }
}
preloadEnemies();

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const starsCanvas = document.getElementById('stars-canvas');
const sCtx = starsCanvas.getContext('2d');
const menuOverlay = document.getElementById('menu-overlay');
const topInfoText = document.getElementById('top-info-text');
const menuStatusWrapper = document.getElementById('menu-status-wrapper');
const controlsText = document.getElementById('controls-text');
const hpBar = document.getElementById('hp-bar');
const ammoCountEl = document.getElementById('ammo-count');
const enemiesEl = document.getElementById('enemies');
const distValEl = document.getElementById('distVal');
const killedWrapper = document.getElementById('killed-wrapper');

let enemiesDefeated = 0, ammo = 20, hp = 100, gameSpeed = 9, baseSpeed = 9, isGameOver = false, frame = 0, animationId, isFirstRun = true;
let distance = 0, lastSpawnDist = 0, nextSpawnGoal = 500, lastIceDist = 0;
let zombiesToBonus = 0, airKills = 0, lastShotTime = 0, isFiring = false, obstacles = [], bullets = [], particles = [], gameOverTimer = 0, shakeTime = 0, lastTime = 0;
let invulFrames = 0, boostTimer = 0, superShotTimer = 0, shieldTimer = 0, canRestart = false, cameraScrollY = 0, boostExitSafety = 0, targetBaseSpeed = 9, isBraking = false;
let cheatLife = false, cheatBuffer = "";

const MAIN_YELLOW = '#ffc240', DARK_YELLOW = '#E0A11D', SHADOW_YELLOW = '#c28b1a', PIT_COLOR = '#c28b1a', BLACK = '#000000', WHITE = '#ffffff', CITY_BROWN = '#AF7C22';

const gameStars = [];
for(let i=0; i<180; i++) { gameStars.push({ x: Math.random(), y: Math.random(), size: Math.random() * 3 + 2, opacity: Math.random(), blinkSpeed: 0.01 + Math.random() * 0.03, isBlinking: Math.random() < 0.3 }); }

function resize() { canvas.width = starsCanvas.width = window.innerWidth; canvas.height = starsCanvas.height = window.innerHeight; adjustMenuScale(); }
window.addEventListener('resize', resize); resize();
const getGroundY = () => (canvas.height * 0.75) | 0;

let stars = []; for (let i = 0; i < 120; i++) { stars.push({ x: Math.random() * canvas.width - canvas.width / 2, y: Math.random() * canvas.height - canvas.height / 2, z: Math.random() * canvas.width }); }

function updateStars() { 
    if (menuOverlay.style.display !== 'none') { 
        sCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height); 
        const cx = starsCanvas.width / 2, cy = starsCanvas.height / 2; sCtx.fillStyle = "rgba(255, 245, 180, 0.9)"; 
        for (let s of stars) { 
            s.z += 6; if (s.z >= starsCanvas.width) { s.z = 1; s.x = Math.random() * starsCanvas.width - cx; s.y = Math.random() * starsCanvas.height - cy; } 
            const px = cx + (s.x / s.z) * starsCanvas.width; const py = cy + (s.y / s.z) * starsCanvas.height;
            const progress = (1 - s.z / starsCanvas.width); const size = Math.max(0.1, progress * 14); 
            if (px > 0 && px < starsCanvas.width && py > 0 && py < starsCanvas.height) {
                sCtx.beginPath(); sCtx.moveTo(px, py - size * 1.8); sCtx.lineTo(px + size * 0.6, py - size * 0.6); sCtx.lineTo(px + size * 1.8, py); sCtx.lineTo(px + size * 0.6, py + size * 0.6); sCtx.lineTo(px, py + size * 1.8); sCtx.lineTo(px - size * 0.6, py + size * 0.6); sCtx.lineTo(px - size * 1.8, py); sCtx.lineTo(px - size * 0.6, py - size * 0.6); sCtx.closePath(); sCtx.fill(); 
            }
        } 
    } requestAnimationFrame(updateStars); 
} 
updateStars();

const raysGroup = document.getElementById('rays-group'); for (let i = 0; i < 30; i++) { const angle = (i * 360 / 30) + (Math.random() * 10); const radCenter = angle * Math.PI / 180, radLeft = (angle - 1) * Math.PI / 180, radRight = (angle + 1) * Math.PI / 180; const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon"); polygon.setAttribute("points", `${Math.cos(radCenter)*250},${Math.sin(radCenter)*250} ${Math.cos(radLeft)*1200},${Math.sin(radLeft)*1200} ${Math.cos(radRight)*1200},${Math.sin(radRight)*1200}`); polygon.setAttribute("fill", DARK_YELLOW); raysGroup.appendChild(polygon); }

function createMountains(count, color, minH, maxH) { let mts = []; let startX = 0; for (let i = 0; i < count; i++) { let segment = [{ x: 0, y: 0 }]; for (let j = 1; j <= 14; j++) segment.push({ x: (j/14) * canvas.width, y: -(Math.sin((j/14) * Math.PI) * (Math.random() * (maxH - minH) + minH)) }); segment.push({ x: canvas.width, y: 0 }); mts.push({ points: segment, color, xOffset: startX }); startX += canvas.width; } return mts; }
let backMountains = createMountains(5, DARK_YELLOW, 120, 280), frontMountains = createMountains(4, SHADOW_YELLOW, 70, 190);

function createCityline(images, spacingMin, spacingMax, scale) { let line = []; let currentX = 0; let lastIdx = -1; for (let i = 0; i < 40; i++) { let idx; do { idx = Math.floor(Math.random() * images.length); } while (idx === lastIdx); lastIdx = idx; let s = scale * (0.9 + Math.random() * 0.2); let img = images[idx]; let w = (img.width || 200) * s; line.push({ img: img, x: currentX, scale: s, w: w }); currentX += w + spacingMin + Math.random() * (spacingMax - spacingMin); } return { objects: line, totalWidth: currentX }; }
function createClouds(images, count, spacingMin, spacingMax) { let line = []; let currentX = 0; for (let i = 0; i < count; i++) { let idx = Math.floor(Math.random() * images.length); let s = 0.35 + Math.random() * 0.35; let op = 0.05 + Math.random() * 0.15; let offY = -350 - Math.random() * 750; line.push({ img: images[idx], x: currentX, scale: s, opacity: op, offY: offY }); currentX += spacingMin + Math.random() * (spacingMax - spacingMin); } return { objects: line, totalWidth: currentX }; }
let city1Data = createCityline(cityline1Images, 700, 1500, 0.9), city2Data = createCityline(cityline2Images, 200, 500, 0.7);
let cloudsData = createClouds(cloudsImages, 40, 600, 1400); 
function createStaticObjects(images, spacingMin, spacingMax) { let line = []; let currentX = 1500; for (let i = 0; i < images.length; i++) { line.push({ img: images[i], x: currentX }); currentX += spacingMin + Math.random() * (spacingMax - spacingMin); } return { objects: line, totalWidth: currentX }; }
let mtnObjData = createStaticObjects(mountainObjectsImages, 3000, 5500);

const hero = {
    w: 110, h: 158, x: 0, y: 0, dy: 0, angle: 0, grounded: false, jumpCount: 0, suspension: 0, fallingInPit: false,
    init() { this.x = (canvas.width / 8) | 0; this.y = -200; this.dy = 0; this.angle = 0; this.jumpCount = 0; this.grounded = false; this.fallingInPit = false; this.suspension = 0; airKills = 0; },
    jump() { 
        if (!this.fallingInPit && !isFirstRun) { 
            const isBoost = boostTimer > 0; 
            const maxJumps = isBoost ? 15 : 2; 
            if (this.jumpCount < maxJumps && (this.grounded || this.jumpCount > 0 || isBoost)) {

function drawCitylineLayer(cityData, camX, camY, panelColor) { const gy = getGroundY(); const tw = cityData.totalWidth; ctx.fillStyle = panelColor; ctx.fillRect(0, gy + camY + 8, canvas.width, 3500); cityData.objects.forEach(obj => { let dx = (obj.x - camX) % tw; if (dx < -1500) dx += tw; if (dx > canvas.width + 1500) dx -= tw; ctx.drawImage(obj.img, dx, gy - (obj.img.height * obj.scale) + camY + 12, obj.img.width * obj.scale, obj.img.height * obj.scale); }); }
function drawCloudsLayer(data, camX, camY) { const tw = data.totalWidth; const gy = getGroundY(); data.objects.forEach(obj => { let dx = (obj.x - camX) % tw; if (dx < -1500) dx += tw; if (dx > canvas.width + 1500) dx -= tw; ctx.save(); ctx.globalAlpha = obj.opacity; ctx.drawImage(obj.img, dx, gy + obj.offY + camY, obj.img.width * obj.scale, obj.img.height * obj.scale); ctx.restore(); }); }
function drawMountainsLayer(mountainsArray, camX, camY) { const gy = getGroundY(), tw = mountainsArray.length * canvas.width; mountainsArray.forEach(mt => { let dx = (mt.xOffset - camX) % tw; if (dx < -canvas.width) dx += tw; if (dx > canvas.width) dx -= tw; ctx.fillStyle = mt.color; ctx.beginPath(); ctx.moveTo(dx, canvas.height + 2500); ctx.lineTo(dx + mt.points[0].x, gy + mt.points[0].y + camY); for (let j = 1; j < mt.points.length; j++) ctx.lineTo(dx + mt.points[j].x, gy + mt.points[j].y + camY); ctx.lineTo(dx + canvas.width, canvas.height + 2500); ctx.closePath(); ctx.fill(); }); }
function drawStaticObjectsLayer(data, camX, camY) { const gy = getGroundY(), tw = data.totalWidth; data.objects.forEach(obj => { let dx = (obj.x - camX) % tw; if (dx < -2500) dx += tw; if (dx > canvas.width + 2500) dx -= tw; if (obj.img.complete) ctx.drawImage(obj.img, dx, gy - obj.img.height + camY + 20); }); }

function triggerGameOver() { 
    if (isGameOver) return; isGameOver = true; isFiring = false; 
    let fadeOut = setInterval(() => {
        if (currentTrack.volume > 0.01) { currentTrack.volume -= 0.01; } 
        else { currentTrack.volume = 0; currentTrack.pause(); clearInterval(fadeOut); }
    }, 20);
    sounds.woosh.pause(); sounds.power.pause();
    if (VOLUMES.death > 0) sounds.death.play(); 
    if (VOLUMES.bg > 0) {
        sounds.bg.currentTime = 0; sounds.bg.volume = 0; sounds.bg.play();
        let fadeIn = setInterval(() => {
            if (sounds.bg.volume < VOLUMES.bg - 0.02) { sounds.bg.volume += 0.01; } 
            else { sounds.bg.volume = VOLUMES.bg; clearInterval(fadeIn); }
        }, 50);
    }
    gameOverTimer = 150; shakeTime = 40; canRestart = false; 
    controlsText.classList.remove('show-text'); 
    const dText = distance < 1000 ? Math.floor(distance) + "м" : (distance/1000).toFixed(1) + "км"; 
    topInfoText.innerText = "ДИСТАНЦИЯ: " + dText; 
    menuStatusWrapper.style.fontSize = IS_MOBILE_DEVICE ? "45px" : "75px"; 
    menuStatusWrapper.innerText = "УНИЧТОЖЕНО: " + enemiesDefeated; 
    adjustMenuScale();
}

function start() { 
    sounds.bg.pause(); 
    if (VOLUMES.mainMusic > 0) {
        currentTrack.volume = VOLUMES.mainMusic; currentTrack.currentTime = 0; currentTrack.play(); 
    }
    menuOverlay.style.opacity = 0; setTimeout(() => { if (!isGameOver) menuOverlay.style.display = 'none'; }, 200); 
    isGameOver = false; isFirstRun = false; enemiesDefeated = 0; ammo = 20; distance = 0; lastSpawnDist = 0; nextSpawnGoal = 500; lastIceDist = 0; updateAmmo(20); enemiesEl.innerText = enemiesDefeated; hp = 100; updateHPBar(); invulFrames = 0; boostTimer = 0; superShotTimer = 0; shieldTimer = 0; boostExitSafety = 0; baseSpeed = 9; gameSpeed = 9; isBraking = false; frame = 0; obstacles = []; bullets = []; particles = []; canRestart = false; cameraScrollY = 0; cheatLife = false; 
    killedWrapper.classList.remove('pulse-bonus'); ammoCountEl.classList.remove('pulse-bonus');
    hero.init(); cancelAnimationFrame(animationId); requestAnimationFrame(render); 
}

window.addEventListener('keydown', (e) => { 
    if (e.key === 'Alt') { e.preventDefault(); cheatLife = false; gameSpeed = baseSpeed; cheatBuffer = ""; return; }
    if (e.key.length === 1) { cheatBuffer += e.key.toLowerCase(); if (cheatBuffer.length > 10) cheatBuffer = cheatBuffer.substring(1); if (cheatBuffer.endsWith("life") || cheatBuffer.endsWith("дшау")) { cheatLife = !cheatLife; if (VOLUMES.life > 0) sounds.life.play(); cheatBuffer = ""; } }
    if (e.code === 'Space') { e.preventDefault(); if (isFirstRun || (isGameOver && canRestart)) start(); else hero.jump(); } 
    if (e.key === 'Control' && !isGameOver && !isFirstRun) { isFiring = true; if ((ammo > 0) && superShotTimer <= 0 && Date.now()-lastShotTime > 110) { fireBullet(); lastShotTime = Date.now(); } } 
});
window.addEventListener('keyup', (e) => { if (e.key === 'Control') isFiring = false; });
window.addEventListener('touchstart', (e) => {
    e.preventDefault(); const touchX = e.touches[0].clientX; const mid = window.innerWidth / 2;
    if (isFirstRun || (isGameOver && canRestart)) { start(); return; }
    if (touchX < mid) { hero.jump(); } else { if (!isGameOver && !isFirstRun) { isFiring = true; if ((ammo > 0) && superShotTimer <= 0 && Date.now() - lastShotTime > 110) { fireBullet(); lastShotTime = Date.now(); } } }
}, { passive: false });
window.addEventListener('touchend', (e) => {
    let stillFiring = false; for (let i = 0; i < e.touches.length; i++) { if (e.touches[i].clientX >= window.innerWidth / 2) stillFiring = true; }
    if (!stillFiring) isFiring = false;
});

window.addEventListener('load', () => { if (!IS_MOBILE_DEVICE) showMenuSounds(); });
</script>
